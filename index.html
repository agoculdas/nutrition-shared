<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F4EFE6" />
  <title>Nutrition</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nutrition" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    :root {
      /* === Tidepool (default) — deep teal & mist, punchy green signal === */
      --bg: #EAF0EF;
      --surface: #FFFFFF;
      --surface-2: #F4F8F7;
      --hairline: #DBE4E2;
      --hairline-strong: #C9D5D2;
      --ink: #1A201F;
      --ink-2: #4E5654;
      --muted: #7E8784;
      --dim: #A8B0AD;

      /* protein/anchor signal — punchy, pushed off the teal accent */
      --good-h: 142;
      --good: oklch(0.585 0.152 142);
      --good-bg: oklch(0.585 0.152 142 / 0.14);
      --good-line: oklch(0.585 0.152 142 / 0.34);

      --warn: oklch(0.56 0.10 67);
      --warn-bg: oklch(0.62 0.105 70 / 0.15);
      --warn-line: oklch(0.60 0.105 70 / 0.38);

      --bad: oklch(0.52 0.15 33);
      --bad-bg: oklch(0.55 0.145 33 / 0.13);
      --bad-line: oklch(0.55 0.145 33 / 0.36);

      /* balanced signal — periwinkle, kept clear of the teal accent */
      --info: oklch(0.52 0.07 268);
      --info-bg: oklch(0.55 0.07 268 / 0.13);
      --info-line: oklch(0.55 0.07 268 / 0.32);

      /* highlight / brand accent */
      --accent-h: 205;
      --accent: oklch(0.50 0.075 205);
      --accent-press: oklch(0.43 0.075 205);
      --accent-bg: oklch(0.50 0.075 205 / 0.10);
      --accent-line: oklch(0.50 0.075 205 / 0.30);
      --on-accent: #F1F8F7;

      --radius: 12px;
      --radius-sm: 8px;
      --shadow-sheet: 0 -10px 44px rgba(20,30,28,0.20);
      --shadow-card: 0 1px 2px rgba(20,30,28,0.05), 0 6px 18px rgba(20,30,28,0.07);

      --font-sans: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-serif: 'Newsreader', Georgia, 'Times New Roman', serif;
    }

    /* === Harbor — denim & pale sky, punchy green signal === */
    :root[data-theme="harbor"] {
      --bg: #ECF0F2;
      --surface-2: #F5F8FA;
      --hairline: #DEE4E8;
      --hairline-strong: #CBD4DA;
      --ink: #1B1F23;
      --ink-2: #4F555B;
      --muted: #7F868D;
      --dim: #AAB2B8;

      --good-h: 145;
      --good: oklch(0.575 0.152 145);
      --good-bg: oklch(0.575 0.152 145 / 0.14);
      --good-line: oklch(0.575 0.152 145 / 0.34);

      /* balanced signal — teal, kept clear of the denim accent */
      --info: oklch(0.52 0.07 200);
      --info-bg: oklch(0.55 0.07 200 / 0.13);
      --info-line: oklch(0.55 0.07 200 / 0.32);

      --accent-h: 248;
      --accent: oklch(0.52 0.10 248);
      --accent-press: oklch(0.44 0.10 248);
      --accent-bg: oklch(0.52 0.10 248 / 0.10);
      --accent-line: oklch(0.52 0.10 248 / 0.30);
      --on-accent: #F3F7FB;

      --shadow-sheet: 0 -10px 44px rgba(20,26,32,0.20);
      --shadow-card: 0 1px 2px rgba(20,26,32,0.05), 0 6px 18px rgba(20,26,32,0.07);
    }

    html { background: var(--bg); }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: 'cv11', 'ss01', 'zero' 0;
      line-height: 1.4;
      min-height: 100vh;
    }

    .app-shell {
      max-width: 460px;
      margin: 0 auto;
      padding: 0 16px 140px;
      min-height: 100vh;
    }
    @media (min-width: 720px) {
      .app-shell { max-width: 560px; padding: 0 20px 140px; }
    }

    /* Mono utility */
    .mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-feature-settings: 'tnum' 1; }
    .tracking-tight { letter-spacing: -0.02em; }
    .tracking-tighter { letter-spacing: -0.04em; }

    /* Section eyebrow */
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Header */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: linear-gradient(180deg, var(--bg) 70%, transparent);
      padding: 14px 0 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .topbar-title {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: 0;
    }
    .topbar-mark {
      width: 14px; height: 16px;
      flex-shrink: 0;
      align-self: center;
      color: var(--ink);
    }
    .topbar-mark svg { width: 100%; height: 100%; display: block; }
    .topbar-h {
      font-size: 14px; font-weight: 600; letter-spacing: -0.01em;
    }
    .topbar-date {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }
    .pace-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 9px 5px 8px;
      border: 1px solid var(--hairline-strong);
      border-radius: 999px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--ink-2);
      background: var(--surface);
    }
    .pace-pill .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted);
    }
    .pace-pill.good .dot { background: var(--good); box-shadow: 0 0 0 3px var(--good-bg); }
    .pace-pill.warn .dot { background: var(--warn); box-shadow: 0 0 0 3px var(--warn-bg); }
    .pace-pill.bad .dot { background: var(--bad); box-shadow: 0 0 0 3px var(--bad-bg); }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .card + .card { margin-top: 10px; }
    .card-pad { padding: 14px 14px; }
    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px 10px;
    }
    .card-divider { height: 1px; background: var(--hairline); }

    /* HERO */
    .hero {
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: var(--radius);
      padding: 16px 16px 14px;
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      gap: 0;
      margin-bottom: 10px;
    }
    .hero-col { padding: 0 4px; }
    .hero-col + .hero-divider { background: var(--hairline); }
    .hero-divider { background: var(--hairline); }
    .hero-label-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .hero-label {
      font-family: var(--font-mono);
      font-size: 10.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .hero-status {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--dim);
    }
    .hero-status.good { color: var(--good); }
    .hero-status.warn { color: var(--warn); }
    .hero-status.bad  { color: var(--bad);  }

    .hero-num {
      font-family: var(--font-mono);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      font-feature-settings: 'tnum' 1;
      font-size: 44px;
      line-height: 1;
      letter-spacing: -0.045em;
      color: var(--ink);
      display: flex;
      align-items: baseline;
      gap: 4px;
    }
    @media (min-width: 380px) {
      .hero-num { font-size: 50px; }
    }
    .hero-num .unit {
      font-size: 14px;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: 0;
    }
    .hero-num .target {
      font-size: 14px;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: 0;
    }
    .hero-rail {
      height: 3px;
      background: var(--hairline-strong);
      border-radius: 2px;
      margin-top: 12px;
      overflow: hidden;
      position: relative;
    }
    .hero-rail-fill {
      height: 100%;
      background: var(--ink);
      border-radius: 2px;
      transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .hero-rail-fill.good { background: var(--good); }
    .hero-rail-fill.warn { background: var(--warn); }
    .hero-rail-fill.bad  { background: var(--bad);  }
    .hero-foot {
      margin-top: 10px;
      font-family: var(--font-mono);
      font-size: 11.5px;
      color: var(--ink-2);
      letter-spacing: -0.005em;
    }
    .hero-foot .num { color: var(--ink); font-weight: 500; }
    .hero-foot .arrow { color: var(--dim); margin: 0 4px; }

    /* Implied ratio inline strip */
    .ratio-strip {
      margin-top: 4px;
      padding: 11px 14px;
      border: 1px solid var(--hairline);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: var(--surface);
    }
    .ratio-strip.good { border-color: var(--good-line); background: var(--good-bg); }
    .ratio-strip.warn { border-color: var(--warn-line); background: var(--warn-bg); }
    .ratio-strip.bad  { border-color: var(--bad-line);  background: var(--bad-bg);  }
    .ratio-strip.info { border-color: var(--info-line); background: var(--info-bg); }
    .ratio-left { font-size: 12.5px; color: var(--ink-2); line-height: 1.45; }
    .ratio-left strong { color: var(--ink); font-family: var(--font-mono); font-weight: 600; }
    .ratio-num {
      font-family: var(--font-mono);
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.03em;
      color: var(--ink);
      flex-shrink: 0;
      line-height: 1;
    }
    .ratio-num.good { color: var(--good); }
    .ratio-num.warn { color: var(--warn); }
    .ratio-num.bad  { color: var(--bad);  }
    .ratio-num .unit { font-size: 10px; color: var(--muted); margin-left: 2px; letter-spacing: 0; }

    /* Day pace strip */
    .pace-strip {
      margin-top: 10px;
      padding: 12px 14px 14px;
      border: 1px solid var(--hairline);
      border-radius: var(--radius);
      background: var(--surface);
    }
    .pace-strip-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 14px;
    }
    .pace-strip-delta {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }
    .pace-strip-delta .num { color: var(--ink); }
    .pace-strip-delta.good .num { color: var(--good); }
    .pace-strip-delta.warn .num { color: var(--warn); }
    .pace-strip-delta.bad  .num { color: var(--bad); }

    .pace-rows {
      display: grid;
      grid-template-columns: 60px 1fr 56px;
      column-gap: 10px;
      row-gap: 8px;
      align-items: center;
    }
    .pace-row-lbl {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .pace-row-bar {
      position: relative;
      height: 6px;
      background: var(--hairline-strong);
      border-radius: 2px;
      overflow: hidden;
    }
    .pace-row-fill {
      position: absolute; left: 0; top: 0; bottom: 0;
      border-radius: 2px;
      transition: width 0.4s ease;
    }
    .pace-row-fill.actual.good { background: var(--good); }
    .pace-row-fill.actual.warn { background: var(--warn); }
    .pace-row-fill.actual.bad  { background: var(--bad);  }
    .pace-row-fill.actual.neutral { background: var(--ink-2); }
    .pace-row-val {
      font-family: var(--font-mono);
      font-size: 11.5px;
      color: var(--ink);
      text-align: right;
      letter-spacing: -0.005em;
    }

    /* Time axis row */
    .pace-axis-wrap {
      position: relative;
      height: 18px;
      margin-top: 2px;
    }
    .pace-axis-line {
      position: absolute;
      left: 0; right: 0; top: 4px;
      height: 1px;
      background: var(--hairline-strong);
    }
    .pace-axis-tick {
      position: absolute;
      top: 1px;
      width: 1px;
      height: 6px;
      background: var(--hairline-strong);
      transform: translateX(-0.5px);
    }
    .pace-axis-label {
      position: absolute;
      top: 9px;
      transform: translateX(-50%);
      font-family: var(--font-mono);
      font-size: 9.5px;
      color: var(--dim);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .pace-now-marker {
      position: absolute;
      top: -2px;
      width: 2px;
      height: 12px;
      background: var(--ink);
      border-radius: 1px;
      transform: translateX(-1px);
      box-shadow: 0 0 0 3px var(--surface);
    }
    .pace-now-label {
      position: absolute;
      top: -16px;
      transform: translateX(-50%);
      font-family: var(--font-mono);
      font-size: 9.5px;
      color: var(--ink);
      letter-spacing: 0.04em;
      white-space: nowrap;
      padding: 1px 4px;
      background: var(--surface);
      border-radius: 3px;
    }
    .pace-foot {
      grid-column: 1 / -1;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--hairline);
      font-size: 11.5px;
      color: var(--ink-2);
      line-height: 1.5;
    }
    .pace-foot .accent.good { color: var(--good); }
    .pace-foot .accent.warn { color: var(--warn); }
    .pace-foot .accent.bad  { color: var(--bad); }
    .pace-foot .num { font-family: var(--font-mono); color: var(--ink); }

    /* Macro budget table */
    .budget-table {
      display: grid;
      grid-template-columns: 60px 1fr 70px 70px;
      font-family: var(--font-mono);
      font-size: 12px;
    }
    .budget-table > div {
      padding: 10px 14px;
      border-bottom: 1px solid var(--hairline);
      display: flex;
      align-items: center;
    }
    .budget-table > div:nth-child(-n+4) {
      padding-top: 8px; padding-bottom: 8px;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: var(--surface-2);
    }
    .budget-table > div:nth-last-child(-n+4) { border-bottom: none; }
    .budget-name { color: var(--ink); font-family: var(--font-sans); font-weight: 500; font-size: 13px; }
    .budget-bar {
      position: relative;
      height: 3px;
      width: 100%;
      background: var(--hairline-strong);
      border-radius: 2px;
      margin-right: 12px;
      overflow: hidden;
    }
    .budget-bar-fill {
      position: absolute; left: 0; top: 0; height: 100%;
      border-radius: 2px;
      transition: width 0.4s ease;
    }
    .budget-bar-fill.good { background: var(--good); }
    .budget-bar-fill.warn { background: var(--warn); }
    .budget-bar-fill.bad  { background: var(--bad);  }
    .budget-bar-fill.dim  { background: var(--dim);  }
    .budget-have { color: var(--ink); justify-content: flex-end; }
    .budget-remain { color: var(--muted); justify-content: flex-end; }
    .budget-remain.alert { color: var(--bad); }
    .budget-table > .budget-bar-cell { padding-right: 0; }

    /* Chart card */
    .chart-card { padding: 14px 14px 12px; }
    .chart-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 6px;
    }
    .chart-cap {
      margin-top: 6px;
      font-size: 11.5px;
      color: var(--ink-2);
      line-height: 1.5;
    }
    .chart-cap .num { font-family: var(--font-mono); color: var(--ink); }
    .chart-cap .accent.good { color: var(--good); }
    .chart-cap .accent.warn { color: var(--warn); }
    .chart-cap .accent.bad  { color: var(--bad);  }

    /* Nudges */
    .nudge {
      padding: 11px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--hairline);
      font-size: 12.5px;
      line-height: 1.5;
      color: var(--ink-2);
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .nudge + .nudge { margin-top: 6px; }
    .nudge-glyph {
      width: 4px; align-self: stretch; border-radius: 2px;
      background: var(--muted);
      flex-shrink: 0;
      min-height: 16px;
    }
    .nudge.bad  .nudge-glyph { background: var(--bad);  }
    .nudge.warn .nudge-glyph { background: var(--warn); }
    .nudge.info .nudge-glyph { background: var(--info); }
    .nudge.good .nudge-glyph { background: var(--good); }
    .nudge.bad  { border-color: var(--bad-line);  background: var(--bad-bg); color: var(--ink); }
    .nudge.warn { border-color: var(--warn-line); background: var(--warn-bg); color: var(--ink); }
    .nudge.info { border-color: var(--info-line); background: var(--info-bg); color: var(--ink); }
    .nudge.good { border-color: var(--good-line); background: var(--good-bg); color: var(--ink); }
    .nudge-text strong { font-weight: 600; color: var(--ink); }

    /* Meal list */
    .meal {
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      border-bottom: 1px solid var(--hairline);
      align-items: start;
      animation: meal-in 0.32s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes meal-in {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .meal:last-child { border-bottom: none; }
    .meal-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
      letter-spacing: -0.01em;
      margin-bottom: 4px;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .role-tag {
      font-family: var(--font-mono);
      font-size: 9.5px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid var(--hairline-strong);
      color: var(--muted);
    }
    .role-tag.anchor { color: var(--good); border-color: var(--good-line); }
    .role-tag.balanced { color: var(--info); border-color: var(--info-line); }
    .role-tag.filler { color: var(--warn); border-color: var(--warn-line); }
    .meal-macros {
      font-family: var(--font-mono);
      font-size: 11.5px;
      color: var(--muted);
      letter-spacing: -0.005em;
    }
    .meal-macros .sep { color: var(--dim); margin: 0 5px; }
    .meal-macros .pp { color: var(--ink-2); }
    .fiber-flag {
      display: inline-flex; align-items: center; gap: 4px;
      font-family: var(--font-mono);
      font-size: 10px; padding: 2px 6px;
      border-radius: 3px;
      background: var(--warn-bg);
      color: var(--warn);
      border: 1px solid var(--warn-line);
    }
    .meal-actions {
      display: flex; gap: 0;
      align-self: start;
    }
    .icon-btn {
      width: 30px; height: 30px;
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      border-radius: var(--radius-sm);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .icon-btn:hover, .icon-btn:active { background: var(--hairline); color: var(--ink); }
    .icon-btn svg { width: 14px; height: 14px; }

    /* FAB / sticky add */
    .fab-wrap {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      padding: 0 16px 18px;
      display: flex; justify-content: center;
      pointer-events: none;
      z-index: 30;
      background: linear-gradient(180deg, transparent, var(--bg) 50%);
      padding-top: 28px;
    }
    .fab {
      pointer-events: auto;
      width: 100%;
      max-width: 428px;
      background: var(--ink);
      color: var(--bg);
      border: none;
      border-radius: 12px;
      padding: 14px 18px;
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 14px;
      letter-spacing: -0.01em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.06) inset;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }
    .fab:active { transform: scale(0.985); }
    .fab svg { width: 16px; height: 16px; }
    @media (min-width: 720px) { .fab { max-width: 528px; } }

    /* Sheet */
    .sheet-backdrop {
      position: fixed; inset: 0;
      background: rgba(20,30,28,0.46);
      z-index: 40;
      animation: fadeIn 0.18s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .sheet {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      background: var(--surface);
      border-top: 1px solid var(--hairline-strong);
      border-radius: 16px 16px 0 0;
      max-height: 86vh;
      overflow-y: auto;
      z-index: 41;
      animation: sheet-up 0.28s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: var(--shadow-sheet);
      /* Promote the scroll container to its own GPU layer so inner scrolling
         composites instead of repainting the sheet (+ its 44px-blur shadow and
         sticky header) on the CPU every frame. Fixes low-FPS scroll on weaker devices. */
      transform: translateZ(0);
      will-change: scroll-position;
      contain: layout paint;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }
    @keyframes sheet-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--hairline-strong);
      border-radius: 2px;
      margin: 8px auto 0;
    }
    .sheet-head {
      padding: 10px 16px 12px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--hairline);
      position: sticky; top: 0;
      background: var(--surface);
      z-index: 2;
    }
    .sheet-title { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
    .sheet-tabs {
      display: inline-flex;
      background: var(--surface-2);
      border: 1px solid var(--hairline);
      border-radius: 7px;
      padding: 2px;
      gap: 0;
    }
    .sheet-tab {
      padding: 5px 11px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 5px;
    }
    .sheet-tab.active { background: var(--surface); color: var(--ink); box-shadow: 0 0 0 1px var(--hairline-strong); }
    .sheet-body { padding: 12px 16px 24px; }

    .sheet-section + .sheet-section { margin-top: 18px; }
    .sheet-section-head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 8px;
    }
    .sheet-section-title {
      font-family: var(--font-mono);
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .sheet-section-meta {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 0.04em;
    }

    /* Visual food cards */
    .food-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    @media (min-width: 380px) {
      .food-grid { grid-template-columns: 1fr 1fr; }
    }
    .food-card {
      text-align: left;
      background: var(--surface-2);
      border: 1px solid var(--hairline);
      border-radius: 8px;
      padding: 10px 11px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 92px;
      position: relative;
      transition: border-color 0.15s, transform 0.12s, background 0.15s;
      font-family: var(--font-sans);
      color: var(--ink);
    }
    .food-card:hover { border-color: var(--hairline-strong); }
    .food-card:active { transform: scale(0.98); background: var(--surface); }
    .food-card-name {
      font-size: 12.5px;
      font-weight: 500;
      letter-spacing: -0.01em;
      line-height: 1.3;
      color: var(--ink);
      flex: 1;
    }
    .food-card-meta {
      display: flex;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: -0.005em;
      align-items: baseline;
    }
    .food-card-meta .kcal { color: var(--ink); font-weight: 500; }
    .food-card-meta .sep { color: var(--dim); }
    .food-card-meta .pp { color: var(--ink-2); }
    .food-card-pp {
      position: absolute;
      top: 9px; right: 10px;
      font-family: var(--font-mono);
      font-size: 9.5px;
      letter-spacing: 0.04em;
      padding: 2px 5px;
      border-radius: 3px;
      background: var(--surface);
      border: 1px solid var(--hairline-strong);
    }
    .food-card-pp.anchor { color: var(--good); border-color: var(--good-line); background: var(--good-bg); }
    .food-card-pp.balanced { color: var(--info); border-color: var(--info-line); background: var(--info-bg); }
    .food-card-pp.filler { color: var(--warn); border-color: var(--warn-line); background: var(--warn-bg); }

    /* Saved chips row */
    .saved-row {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .saved-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      background: var(--surface-2);
      border: 1px solid var(--hairline);
      border-radius: 999px;
      font-size: 12px;
      color: var(--ink);
      cursor: pointer;
      font-family: var(--font-sans);
    }
    .saved-chip:hover { border-color: var(--hairline-strong); }
    .saved-chip .kcal {
      font-family: var(--font-mono);
      font-size: 10.5px;
      color: var(--muted);
    }
    .saved-empty { font-size: 12px; color: var(--muted); padding: 4px 0; }

    /* Custom form */
    .custom-form input {
      background: var(--surface-2);
      border: 1px solid var(--hairline);
      color: var(--ink);
      padding: 11px 12px;
      border-radius: 8px;
      width: 100%;
      font-family: var(--font-sans);
      font-size: 14px;
    }
    .custom-form input.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
    .custom-form input::placeholder { color: var(--dim); }
    .custom-form input:focus { outline: none; border-color: var(--hairline-strong); background: var(--surface); }
    .form-grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    .form-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    .input-with-label {
      position: relative;
    }
    .input-with-label .lbl {
      position: absolute;
      top: 8px; left: 12px;
      font-family: var(--font-mono);
      font-size: 9.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
      pointer-events: none;
    }
    .input-with-label input { padding-top: 22px; padding-bottom: 8px; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      background: var(--ink);
      color: var(--bg);
      border: none;
      padding: 12px 16px;
      border-radius: 8px;
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 13.5px;
      cursor: pointer;
      width: 100%;
      letter-spacing: -0.01em;
    }
    .btn:active { transform: scale(0.99); }
    .btn-secondary {
      background: var(--surface-2);
      color: var(--ink);
      border: 1px solid var(--hairline-strong);
    }
    .form-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
    .form-actions.single { grid-template-columns: 1fr; }

    /* Day summary */
    .summary-rows { padding: 4px 0; }
    .sum-row {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      border-bottom: 1px solid var(--hairline);
      font-size: 13px;
    }
    .sum-row:last-child { border-bottom: none; }
    .sum-name { color: var(--ink); font-weight: 500; }
    .sum-val {
      font-family: var(--font-mono);
      font-size: 13.5px;
      color: var(--ink);
      letter-spacing: -0.01em;
      min-width: 58px;
      text-align: right;
    }
    .sum-target {
      font-family: var(--font-mono);
      font-size: 11.5px;
      color: var(--muted);
      min-width: 76px;
      text-align: right;
    }
    .sum-state {
      width: 18px; height: 18px;
      border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .sum-state.pass { background: var(--good-bg); color: var(--good); border: 1px solid var(--good-line); }
    .sum-state.fail { background: var(--bad-bg); color: var(--bad); border: 1px solid var(--bad-line); }

    /* Empty / first-run */
    .empty-state {
      padding: 22px 16px 18px;
      text-align: left;
    }
    .empty-state h3 {
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 6px;
      letter-spacing: -0.015em;
    }
    .empty-state p {
      font-size: 13px;
      color: var(--ink-2);
      margin: 0 0 14px;
      line-height: 1.55;
    }
    .arch-list {
      display: grid; gap: 8px;
      margin-top: 10px;
    }
    .arch-item {
      display: grid;
      grid-template-columns: 22px 1fr auto;
      gap: 10px;
      padding: 10px 12px;
      background: var(--surface-2);
      border: 1px solid var(--hairline);
      border-radius: 8px;
      align-items: center;
    }
    .arch-num {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
    }
    .arch-text { font-size: 12.5px; color: var(--ink); }
    .arch-text strong { font-weight: 600; }
    .arch-meta {
      font-family: var(--font-mono);
      font-size: 10.5px;
      color: var(--muted);
    }

    /* Meals card head with action */
    .card-head .right-actions { display: flex; gap: 6px; }
    .ghost-btn {
      background: transparent;
      border: 1px solid var(--hairline);
      color: var(--muted);
      padding: 5px 9px;
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 10.5px;
      letter-spacing: 0.04em;
      cursor: pointer;
    }
    .ghost-btn:hover { color: var(--ink); border-color: var(--hairline-strong); }

    /* Add ripple on add */
    @keyframes pulse-good {
      0% { box-shadow: 0 0 0 0 oklch(0.82 0.16 145 / 0.5); }
      100% { box-shadow: 0 0 0 18px oklch(0.82 0.16 145 / 0); }
    }
    .pulse-good { animation: pulse-good 0.6s ease-out; }

    /* Number flash */
    @keyframes num-flash {
      0% { color: var(--good); }
      100% { color: var(--ink); }
    }
    .num-flash { animation: num-flash 0.7s ease-out; }

    /* Chart */
    .chart-svg { width: 100%; height: auto; display: block; }

    /* utility responsive padding for desktop */
    @media (min-width: 720px) {
      .hero-num { font-size: 56px; }
    }

    /* === Settings sheet polish === */
    .gear-btn {
      width: 32px; height: 32px;
      background: transparent;
      border: 1px solid var(--hairline);
      color: var(--ink-2);
      cursor: pointer;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.18s, color 0.18s, border-color 0.18s, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .gear-btn:hover { background: var(--surface-2); color: var(--ink); border-color: var(--hairline-strong); }
    .gear-btn:hover svg { transform: translateY(-1px); }
    .gear-btn:active { transform: scale(0.94); }
    .gear-btn svg { width: 15px; height: 15px; transition: transform 0.55s cubic-bezier(0.16, 1, 0.3, 1); }

    /* === History sheet === */
    .history-head-row {
      display: flex; align-items: baseline; justify-content: space-between;
      padding: 4px 16px 12px;
    }
    .history-head-row .history-eyebrow {
      font-family: var(--font-mono);
      font-size: 9.5px; font-weight: 500; letter-spacing: 0.14em;
      color: var(--dim); text-transform: uppercase;
    }
    .history-head-row .history-range { font-size: 11.5px; color: var(--ink-2); font-family: var(--font-mono); }

    .history-summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 0 16px 12px;
    }
    .history-summary-cell {
      background: var(--surface-2);
      border-radius: 8px;
      padding: 10px 12px;
      border: 1px solid var(--hairline);
    }
    .history-summary-label {
      font-family: var(--font-mono);
      font-size: 9px; font-weight: 500; letter-spacing: 0.14em;
      color: var(--dim); text-transform: uppercase;
      margin-bottom: 4px;
    }
    .history-summary-value {
      font-family: var(--font-mono);
      font-size: 18px; color: var(--ink); font-weight: 600;
      letter-spacing: -0.01em;
    }
    .history-summary-sub {
      font-family: var(--font-mono);
      font-size: 10px; color: var(--ink-2);
      margin-top: 2px;
    }

    .history-day {
      padding: 12px 16px;
      border-top: 1px solid var(--hairline);
    }
    .history-day:first-of-type { border-top: 1px solid var(--hairline-strong); }
    .history-day.today { background: oklch(0.18 0.01 240 / 0.4); }
    .history-day.empty { opacity: 0.5; }

    .history-day-head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 8px;
    }
    .history-day-date {
      font-size: 13px; color: var(--ink); font-weight: 500;
      letter-spacing: -0.005em;
    }
    .history-day-date .day-rel { color: var(--dim); margin-left: 6px; font-weight: 400; }
    .history-day-meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-2); }

    .history-day-bars {
      display: grid;
      grid-template-columns: 60px 1fr auto;
      gap: 8px;
      align-items: center;
      font-family: var(--font-mono);
      font-size: 10.5px;
      margin-bottom: 4px;
    }
    .history-day-bars .label { color: var(--dim); text-transform: uppercase; letter-spacing: 0.1em; font-size: 9.5px; }
    .history-day-bars .track {
      height: 6px;
      background: var(--surface-2);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }
    .history-day-bars .fill {
      height: 100%;
      background: var(--ink-2);
      border-radius: 3px;
      transition: width 0.18s ease;
    }
    .history-day-bars .fill.hit { background: oklch(0.82 0.16 145); }
    .history-day-bars .fill.under { background: oklch(0.72 0.05 50); }
    .history-day-bars .fill.over { background: oklch(0.72 0.18 30); }
    .history-day-bars .floor-tick {
      position: absolute; top: -2px; bottom: -2px;
      width: 1px; background: var(--ink-2); opacity: 0.5;
    }
    .history-day-bars .val { color: var(--ink-2); font-size: 10.5px; min-width: 70px; text-align: right; }
    .history-day-bars .val.hit { color: oklch(0.82 0.16 145); }
    .history-day-bars .val.over { color: oklch(0.72 0.18 30); }

    .history-day-meals {
      margin-top: 8px;
      padding-left: 4px;
      font-family: var(--font-mono);
      font-size: 10.5px;
      color: var(--ink-2);
    }
    .history-day-meals .h-meal { display: flex; justify-content: space-between; padding: 2px 0; }
    .history-day-meals .h-meal-name { color: var(--ink-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 70%; }
    .history-day-meals .h-meal-macros { color: var(--dim); }

    .history-day-toggle {
      background: transparent; border: 0; color: var(--dim);
      font-size: 10.5px; padding: 4px 0; cursor: pointer;
      font-family: var(--font-mono); letter-spacing: 0.05em;
      margin-top: 4px;
    }
    .history-day-toggle:hover { color: var(--ink-2); }

    .history-empty {
      padding: 32px 16px;
      text-align: center;
      color: var(--dim);
      font-size: 13px;
    }

    .history-export-row {
      display: flex; gap: 8px; padding: 12px 16px 4px;
      border-top: 1px solid var(--hairline);
      margin-top: 8px;
    }
    .history-export-row .btn { flex: 1; }

    /* Saved pill */
    .saved-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px 3px 7px;
      border-radius: 999px;
      background: var(--good-bg);
      border: 1px solid var(--good-line);
      color: var(--good);
      font-family: var(--font-mono);
      font-size: 9.5px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(-2px);
      transition: opacity 0.22s ease, transform 0.22s ease;
      pointer-events: none;
    }
    .saved-pill.visible { opacity: 1; transform: translateY(0); }
    .saved-pill .tick {
      width: 8px; height: 8px;
    }
    .saved-pill.idle {
      background: transparent;
      border-color: var(--hairline);
      color: var(--muted);
    }

    /* Settings preview at top of sheet */
    .settings-preview {
      padding: 14px 16px 12px;
      background: linear-gradient(180deg, var(--surface-2), var(--surface));
      border-bottom: 1px solid var(--hairline);
    }
    .settings-preview-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 12px;
    }
    .settings-preview-eyebrow {
      font-family: var(--font-mono);
      font-size: 9.5px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .settings-preview-meta {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 0.04em;
    }
    .settings-preview-rows {
      display: grid;
      gap: 9px;
    }
    .sp-row {
      display: grid;
      grid-template-columns: 56px 1fr auto;
      align-items: center;
      gap: 10px;
    }
    .sp-row-lbl {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .sp-row-bar {
      position: relative;
      height: 5px;
      background: var(--hairline-strong);
      border-radius: 2px;
      overflow: visible;
    }
    .sp-row-fill {
      position: absolute; left: 0; top: 0; bottom: 0;
      border-radius: 2px;
      background: var(--ink-2);
      transition: width 0.32s cubic-bezier(0.16, 1, 0.3, 1), background 0.2s;
    }
    .sp-row-fill.good { background: var(--good); }
    .sp-row-fill.warn { background: var(--warn); }
    .sp-row-fill.bad  { background: var(--bad);  }
    .sp-row-floor {
      position: absolute;
      top: -2px; bottom: -2px;
      width: 1px;
      background: var(--muted);
      transition: left 0.32s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .sp-row-floor::after {
      content: 'FLOOR';
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-mono);
      font-size: 8px;
      letter-spacing: 0.1em;
      color: var(--dim);
      white-space: nowrap;
    }
    .sp-row-val {
      font-family: var(--font-mono);
      font-size: 11.5px;
      color: var(--ink);
      text-align: right;
      letter-spacing: -0.005em;
      white-space: nowrap;
      transition: color 0.2s;
    }
    .sp-row-val .target { color: var(--muted); }
    .sp-row-val.flash { color: var(--good); }

    /* Premium field */
    .field {
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .field-shell {
      position: relative;
      background: var(--surface-2);
      border: 1px solid var(--hairline);
      border-radius: 10px;
      padding: 10px 12px 8px;
      transition: border-color 0.16s, background 0.16s, box-shadow 0.16s;
    }
    .field-shell:focus-within {
      border-color: var(--hairline-strong);
      background: var(--surface);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.025);
    }
    .field-shell.error {
      border-color: var(--bad-line);
      background: var(--bad-bg);
    }
    .field-shell.error:focus-within {
      box-shadow: 0 0 0 3px oklch(0.45 0.14 25 / 0.25);
    }
    .field-lbl {
      display: block;
      font-family: var(--font-mono);
      font-size: 9.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 2px;
    }
    .field-shell.error .field-lbl { color: var(--bad); }
    .field-row {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }
    .field-input {
      background: transparent;
      border: none;
      outline: none;
      padding: 0;
      width: 100%;
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
      font-feature-settings: 'tnum' 1;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.025em;
      color: var(--ink);
      line-height: 1.1;
      min-width: 0;
      /* hide native spinners */
      -moz-appearance: textfield;
    }
    .field-input::-webkit-outer-spin-button,
    .field-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .field-input::placeholder { color: var(--dim); }
    .field-unit {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }
    .field-error {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.02em;
      color: var(--bad);
      margin-top: 6px;
      padding-left: 2px;
      animation: field-err-in 0.18s ease;
    }
    @keyframes field-err-in {
      from { opacity: 0; transform: translateY(-2px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Range pair: min/max with shared rail visualization */
    .range-pair {
      background: var(--surface-2);
      border: 1px solid var(--hairline);
      border-radius: 10px;
      padding: 12px 14px 14px;
      transition: border-color 0.16s;
    }
    .range-pair:focus-within { border-color: var(--hairline-strong); background: var(--surface); }
    .range-pair.error { border-color: var(--bad-line); background: var(--bad-bg); }
    .range-pair-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 12px;
    }
    .range-pair-name {
      font-family: var(--font-mono);
      font-size: 10.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-2);
      font-weight: 500;
    }
    .range-pair.error .range-pair-name { color: var(--bad); }
    .range-pair-readout {
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
      font-size: 14px;
      color: var(--ink);
      letter-spacing: -0.01em;
    }
    .range-pair-readout .sep { color: var(--dim); margin: 0 6px; }
    .range-pair-readout .unit { color: var(--muted); font-size: 11px; margin-left: 3px; }
    .range-rail-wrap {
      position: relative;
      height: 26px;
      margin: 0 8px 6px;
    }
    .range-rail {
      position: absolute;
      left: 0; right: 0; top: 11px;
      height: 4px;
      background: var(--hairline-strong);
      border-radius: 2px;
    }
    .range-rail-fill {
      position: absolute;
      top: 11px;
      height: 4px;
      background: var(--ink-2);
      border-radius: 2px;
      transition: background 0.2s;
    }
    .range-pair.error .range-rail-fill { background: var(--bad); }
    .range-input {
      position: absolute;
      left: -8px; right: -8px;
      width: calc(100% + 16px);
      top: 0;
      height: 26px;
      background: transparent;
      pointer-events: none;
      -webkit-appearance: none;
      appearance: none;
      margin: 0;
    }
    .range-input::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      pointer-events: auto;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--ink);
      border: 2px solid var(--bg);
      box-shadow: 0 2px 6px rgba(0,0,0,0.5), 0 0 0 1px var(--hairline-strong);
      cursor: grab;
      transition: transform 0.12s ease;
    }
    .range-input::-webkit-slider-thumb:hover { transform: scale(1.12); }
    .range-input::-webkit-slider-thumb:active { cursor: grabbing; transform: scale(1.18); }
    .range-input::-moz-range-thumb {
      pointer-events: auto;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--ink);
      border: 2px solid var(--bg);
      box-shadow: 0 2px 6px rgba(0,0,0,0.5), 0 0 0 1px var(--hairline-strong);
      cursor: grab;
    }
    .range-input::-webkit-slider-runnable-track { background: transparent; height: 26px; }
    .range-input::-moz-range-track { background: transparent; height: 26px; }
    .range-pair.error .range-input::-webkit-slider-thumb {
      box-shadow: 0 2px 6px rgba(0,0,0,0.5), 0 0 0 1px var(--bad-line);
    }
    .range-pair-axis {
      display: flex; justify-content: space-between;
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--dim);
      letter-spacing: 0.06em;
      padding: 0 8px;
      margin-top: -2px;
    }
    .range-pair-context {
      margin-top: 10px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.45;
    }
    .range-pair-context strong { color: var(--ink-2); font-weight: 500; }

    /* Section spacing inside settings */
    .settings-section {
      padding: 16px 16px 4px;
      border-bottom: 1px solid var(--hairline);
    }
    .settings-section:last-child { border-bottom: none; }
    .settings-section-head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 10px;
    }
    .settings-section-title {
      font-family: var(--font-mono);
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-2);
    }
    .settings-section-meta {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .settings-section-meta .delta {
      transition: color 0.2s;
    }
    .settings-section-help {
      font-size: 11.5px;
      color: var(--muted);
      line-height: 1.5;
      margin: -2px 0 12px;
    }
    .pc-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .settings-foot {
      padding: 14px 16px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      border-top: 1px solid var(--hairline);
    }
    .settings-foot .ghost-btn { padding: 8px 12px; font-size: 11px; }

    /* hide scroll bg leak */
    @supports (-webkit-touch-callout: none) {
      body { padding-bottom: env(safe-area-inset-bottom); }
    }

    /* === Cuisine folders === */
    .cuisine-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .cuisine-folder {
      display: grid; grid-template-columns: 28px 1fr auto auto;
      align-items: center; gap: 10px;
      padding: 12px 12px;
      background: var(--surface-2);
      border: 1px solid var(--hairline);
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--font-sans); color: var(--ink); text-align: left;
      transition: border-color 0.15s, background 0.15s, transform 0.12s;
    }
    .cuisine-folder:hover { border-color: var(--hairline-strong); }
    .cuisine-folder:active { transform: scale(0.985); background: var(--surface); }
    .cuisine-glyph {
      width: 28px; height: 28px;
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--surface);
      border: 1px solid var(--hairline-strong);
      border-radius: 6px;
      font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
      color: var(--ink-2);
    }
    .cuisine-label { font-size: 13px; font-weight: 500; letter-spacing: -0.005em; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cuisine-count {
      font-size: 10.5px; color: var(--muted);
      padding: 2px 6px;
      border: 1px solid var(--hairline);
      border-radius: 999px;
      background: var(--surface);
    }
    .cuisine-chev { width: 12px; height: 12px; color: var(--dim); }
    .cuisine-back {
      display: inline-flex; align-items: center; gap: 6px;
      background: transparent; border: none;
      color: var(--ink-2);
      font-family: var(--font-sans); font-size: 12px; font-weight: 500;
      cursor: pointer; padding: 4px 0; letter-spacing: -0.005em;
    }
    .cuisine-back:hover { color: var(--ink); }
    .cuisine-back svg { width: 14px; height: 14px; }

    /* === Builder === */
    .builder-search-wrap { position: relative; margin-bottom: 12px; }
    .builder-search-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      width: 14px; height: 14px; color: var(--muted);
      pointer-events: none;
    }
    .builder-search {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--hairline);
      color: var(--ink);
      padding: 11px 36px 11px 34px;
      border-radius: 8px;
      font-family: var(--font-sans); font-size: 14px; letter-spacing: -0.005em;
    }
    .builder-search::placeholder { color: var(--dim); }
    .builder-search:focus { outline: none; border-color: var(--hairline-strong); background: var(--surface); }
    .builder-search-clear {
      position: absolute; right: 6px; top: 50%;
      transform: translateY(-50%);
      width: 26px; height: 26px;
      background: transparent; border: none;
      color: var(--muted); cursor: pointer;
      border-radius: 5px;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .builder-search-clear svg { width: 12px; height: 12px; }
    .builder-search-clear:hover { color: var(--ink); background: var(--hairline); }
    .builder-results {
      border: 1px solid var(--hairline);
      border-radius: 8px;
      background: var(--surface-2);
      overflow: hidden;
      margin-bottom: 14px;
    }
    .builder-result {
      display: grid; grid-template-columns: 1fr auto auto;
      align-items: center; gap: 10px;
      width: 100%;
      padding: 10px 12px;
      background: transparent; border: none;
      border-bottom: 1px solid var(--hairline);
      cursor: pointer;
      font-family: var(--font-sans); color: var(--ink); text-align: left;
    }
    .builder-result:last-child { border-bottom: none; }
    .builder-result:hover { background: var(--surface); }
    .builder-result-name { font-size: 13px; font-weight: 500; }
    .builder-result-meta { font-size: 11px; color: var(--muted); }
    .builder-result-group {
      font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--dim);
      padding: 2px 6px;
      border: 1px solid var(--hairline);
      border-radius: 3px;
    }
    .builder-empty { padding: 14px; font-size: 12px; color: var(--muted); text-align: center; }
    .builder-suggest { padding: 4px 0 12px; }
    .builder-chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .builder-chip {
      background: var(--surface-2);
      border: 1px solid var(--hairline);
      color: var(--ink-2);
      padding: 7px 10px;
      border-radius: 999px;
      font-family: var(--font-sans); font-size: 12px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .builder-chip:hover { border-color: var(--hairline-strong); color: var(--ink); }
    .builder-stack {
      border: 1px solid var(--hairline);
      border-radius: 10px;
      background: var(--surface-2);
      overflow: hidden;
    }
    .builder-group { border-bottom: 1px solid var(--hairline); }
    .builder-group:last-child { border-bottom: none; }
    .builder-group-head {
      padding: 9px 12px 6px;
      background: var(--surface);
      border-bottom: 1px solid var(--hairline);
    }
    .builder-row {
      display: grid; grid-template-columns: 1fr 64px 64px 30px;
      align-items: center; gap: 8px;
      padding: 8px 8px 8px 12px;
      border-bottom: 1px solid var(--hairline);
      animation: meal-in 0.22s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .builder-row:last-child { border-bottom: none; }
    .builder-row-name {
      font-size: 13px; font-weight: 500; color: var(--ink); letter-spacing: -0.005em;
      min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .builder-qty {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--hairline);
      color: var(--ink);
      padding: 7px 8px;
      border-radius: 6px;
      font-size: 13px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      -moz-appearance: textfield;
    }
    .builder-qty::-webkit-outer-spin-button,
    .builder-qty::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .builder-qty:focus { outline: none; border-color: var(--hairline-strong); }
    .builder-unit {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--hairline);
      color: var(--ink);
      padding: 7px 6px;
      border-radius: 6px;
      font-size: 12px;
      letter-spacing: 0.02em;
      cursor: pointer;
    }
    .builder-unit:focus { outline: none; border-color: var(--hairline-strong); }
    .builder-unit-static {
      font-size: 11px; color: var(--muted); letter-spacing: 0.04em;
      text-align: center;
      padding: 7px 6px;
      border: 1px dashed var(--hairline);
      border-radius: 6px;
    }
    .builder-summary {
      margin-top: 12px;
      padding: 12px 14px;
      border: 1px solid var(--hairline);
      border-radius: 10px;
      background: var(--surface-2);
    }
    .builder-summary-eyebrow {
      font-family: var(--font-mono);
      font-size: 9.5px; font-weight: 500; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 4px;
    }
    .builder-summary-text { font-size: 13.5px; color: var(--ink); letter-spacing: -0.005em; line-height: 1.45; }
    .builder-summary-macros {
      margin-top: 8px;
      display: flex; flex-wrap: wrap; align-items: baseline; gap: 6px;
      font-size: 11.5px; color: var(--ink-2);
      letter-spacing: 0.01em;
    }
    .builder-summary-macros .bsm-kcal { color: var(--ink); font-weight: 600; }
    .builder-summary-macros .bsm-sep { color: var(--rule); }
    .builder-summary-macros .bsm-pp { font-weight: 600; }
    .builder-summary-macros .bsm-pp-anchor { color: oklch(0.82 0.16 145); }
    .builder-summary-macros .bsm-pp-balanced { color: oklch(0.85 0.10 85); }
    .builder-summary-macros .bsm-pp-filler { color: oklch(0.72 0.05 50); }
    .builder-summary-stub {
      font-size: 10px; color: var(--dim);
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-top: 6px;
    }

    .sheet-tab { padding: 5px 9px !important; font-size: 11.5px !important; letter-spacing: -0.005em; }

    /* === Builder folders (organized library) === */
    .builder-folders {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      padding: 4px;
      background: var(--surface-2);
      border: 1px solid var(--hairline);
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .builder-folder {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 2px;
      padding: 8px 4px 7px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      color: var(--muted);
      font-family: var(--font-sans);
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .builder-folder:hover { color: var(--ink-2); }
    .builder-folder.active {
      background: var(--surface);
      color: var(--ink);
      border-color: var(--hairline-strong);
    }
    .builder-folder-label {
      font-size: 12px; font-weight: 500; letter-spacing: -0.005em;
    }
    .builder-folder-meta {
      font-family: var(--font-mono);
      font-size: 9.5px; letter-spacing: 0.06em;
      color: var(--dim);
    }
    .builder-folder.active .builder-folder-meta { color: var(--muted); }
    .builder-folder-meta .sel { color: var(--good); }

    .builder-library {
      border: 1px solid var(--hairline);
      border-radius: 10px;
      background: var(--surface);
      overflow: hidden;
      margin-bottom: 12px;
    }
    .builder-sub {
      border-bottom: 1px solid var(--hairline);
    }
    .builder-sub:last-child { border-bottom: none; }
    .builder-sub-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 12px 4px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--hairline);
    }
    .builder-sub-title {
      font-family: var(--font-mono);
      font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted);
    }
    .builder-sub-count {
      font-family: var(--font-mono);
      font-size: 9.5px; letter-spacing: 0.08em;
      color: var(--dim);
    }
    .builder-tiles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--hairline);
    }
    .builder-tile {
      position: relative;
      display: flex; flex-direction: column; gap: 3px;
      padding: 9px 12px 9px 12px;
      background: var(--surface);
      border: none;
      text-align: left;
      cursor: pointer;
      color: var(--ink);
      font-family: var(--font-sans);
      transition: background 0.12s;
      min-height: 52px;
      -webkit-user-select: none; user-select: none;
      -webkit-touch-callout: none;
    }
    .builder-tile:hover { background: var(--surface-2); }
    .builder-tile.selected {
      background: var(--surface-2);
      box-shadow: inset 2px 0 0 var(--good);
    }
    .builder-tile-name {
      font-size: 12.5px; font-weight: 500; letter-spacing: -0.005em;
      color: var(--ink);
      padding-right: 22px;
      line-height: 1.3;
    }
    .builder-tile-meta {
      font-family: var(--font-mono);
      font-size: 10px; letter-spacing: 0.02em;
      color: var(--muted);
    }
    .builder-tile.selected .builder-tile-meta { color: var(--ink-2); }

    /* Inline qty stepper inside a selected tile */
    .builder-tile-stepper {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 2px;
    }
    .builder-step-btn {
      width: 20px; height: 20px;
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--surface);
      border: 1px solid var(--hairline-strong);
      border-radius: 4px;
      color: var(--ink-2);
      font-family: var(--font-mono);
      font-size: 12px; line-height: 1;
      cursor: pointer;
      padding: 0;
    }
    .builder-step-btn:hover { color: var(--ink); border-color: var(--muted); }
    .builder-step-val {
      font-family: var(--font-mono);
      font-size: 11px; color: var(--ink);
      min-width: 44px; text-align: center;
      letter-spacing: 0;
    }

    /* Top-right badge: count + tap to remove all */
    .builder-tile-badge {
      position: absolute; top: 8px; right: 8px;
      height: 18px; min-width: 18px;
      padding: 0 5px;
      border-radius: 9px;
      display: inline-flex; align-items: center; justify-content: center; gap: 3px;
      font-family: var(--font-mono);
      font-size: 9.5px; font-weight: 600;
      background: var(--good);
      color: var(--bg);
      border: none;
      cursor: pointer;
      transition: background 0.12s;
    }
    .builder-tile-badge:hover { background: var(--ink); }
    .builder-tile-badge svg { width: 8px; height: 8px; }

    .builder-empty-folder {
      padding: 28px 14px;
      text-align: center;
      font-size: 12px; color: var(--muted);
    }
    .builder-selected-head {
      display: flex; align-items: center; justify-content: space-between;
      margin: 4px 2px 6px;
    }
    .builder-selected-head .sheet-section-title { color: var(--ink-2); }
    .builder-selected-meta {
      font-family: var(--font-mono);
      font-size: 10px; color: var(--dim);
      letter-spacing: 0.06em;
    }

    /* Toast pinned to sheet */
    .builder-toast {
      position: sticky; bottom: 8px;
      align-self: center;
      margin: 8px auto 0;
      padding: 7px 12px;
      background: var(--ink);
      color: var(--bg);
      border-radius: 999px;
      font-family: var(--font-mono);
      font-size: 11px; letter-spacing: 0;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      pointer-events: none;
      z-index: 5;
      animation: toast-in 0.18s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes toast-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .builder-toast-host {
      position: sticky; bottom: 8px;
      display: flex; justify-content: center;
      pointer-events: none;
      z-index: 5;
    }

    /* ============================================================
       Pantry re-theme refinements — carried across the whole app.
       (Token swap above re-skins most of it; these are the
       intentional type/accent moments + dark-assuming fixes.)
       ============================================================ */
    body { font-feature-settings: normal; }

    /* Editorial serif for identity + display numbers */
    .topbar-h { font-family: var(--font-serif); font-size: 16px; font-weight: 500; letter-spacing: -0.01em; white-space: nowrap; }
    .hero-num { font-family: var(--font-sans); font-weight: 600; letter-spacing: -0.03em; }
    .hero-num .unit, .hero-num .target { font-family: var(--font-sans); font-weight: 500; }
    .meal-name > span:first-child { font-family: var(--font-serif); font-size: 16px; font-weight: 500; letter-spacing: -0.012em; }
    .sheet-title { font-family: var(--font-serif); font-weight: 500; letter-spacing: -0.01em; white-space: nowrap; }
    .fab { white-space: nowrap; }
    .sheet-section-title { font-family: var(--font-serif); font-weight: 500; font-size: 15px; letter-spacing: -0.01em; }

    /* Ease micro-labels off the tight mono/IDE tracking */
    .eyebrow, .hero-label, .hero-status, .pace-strip-delta { letter-spacing: 0.05em; }
    .eyebrow { white-space: nowrap; }

    /* Warm elevation on surfaces */
    .card, .hero, .ratio-strip, .pace-strip { box-shadow: var(--shadow-card); }

    /* Clay accent on primary actions */
    .btn { background: var(--accent); color: var(--on-accent); }
    .btn:active { background: var(--accent-press); }
    .fab { background: var(--accent); color: var(--on-accent); box-shadow: 0 8px 22px oklch(0.52 0.09 var(--accent-h) / 0.30); }

    /* Dark-assuming hardcoded colors → warm equivalents */
    .history-day.today { background: var(--accent-bg); }
    .history-day-bars .fill.hit { background: var(--good); }
    .history-day-bars .fill.under { background: var(--warn); }
    .history-day-bars .fill.over { background: var(--bad); }
    .history-day-bars .val.hit { color: var(--good); }
    .history-day-bars .val.over { color: var(--bad); }
    .field-shell:focus-within { box-shadow: 0 0 0 3px var(--accent-bg) !important; border-color: var(--accent); }
    .builder-summary-macros .bsm-pp-anchor { color: var(--good); }
