function resolveComposition(builder) {
  const t = { kcal: 0, p: 0, f: 0, c: 0, fiber: 0 };
  if (!Array.isArray(builder)) return t;
  for (const r of builder) {
    const comp = BUILDER_COMPONENTS.find(x => x.id === r.componentId);
    if (!comp) continue;
    const factor = (comp.unitFactor && comp.unitFactor[r.unit] != null) ? comp.unitFactor[r.unit] : 1;
    const ratio = ((Number(r.qty) || 0) * factor) / comp.defaultQty;
    t.kcal += comp.macros.kcal * ratio;
    t.p += comp.macros.p * ratio;
    t.f += comp.macros.f * ratio;
    t.c += comp.macros.c * ratio;
    t.fiber += comp.macros.fiber * ratio;
  }
  return t;
}

// Presets derive macros + category from their component composition, so the
// numbers can never drift from the parts. Edit a component → its presets follow.
const PRESETS = PRESET_DEFS.map(d => {
  const m = resolveComposition(d._builder);
  const r1 = (n) => Math.round(n * 10) / 10;
  return {
    ...d,
    kcal: Math.round(m.kcal),
    p: r1(m.p), f: r1(m.f), c: r1(m.c), fiber: r1(m.fiber),
    cat: categoryFromPp(m.kcal > 0 ? (m.p / m.kcal) * 100 : 0),
  };
});


const BUILDER_GROUPS = [
  { key: 'protein', label: 'Protein' },
  { key: 'carb',    label: 'Carb' },
  { key: 'veg',     label: 'Veg' },
  { key: 'fat',     label: 'Fat' },
  { key: 'dish',    label: 'Dishes' },
];

// ── Composition display helpers (surfacing a preset's parts on its card) ──
const COMP_BY_ID = {};
for (const _c of BUILDER_COMPONENTS) COMP_BY_ID[_c.id] = _c;

const FRAC_MAP = { '0.25': '¼', '0.5': '½', '0.75': '¾', '1.25': '1¼', '1.5': '1½', '1.75': '1¾', '2.5': '2½', '0.8': '⅘' };
function fmtFrac(q) { const k = String(q); return FRAC_MAP[k] || k; }
// short, lowercase ingredient name for chips: "Rice (white, cooked)" → "rice"
function compShort(c) {
  if (!c) return '';
  return c.name.replace(/\s*\([^)]*\)/g, '').replace(/\s*\/.*$/, '').trim().toLowerCase();
}
// compact quantity for a chip: 200g · ×3 · ½ cup · 2 tbsp
function chipQty(qty, unit) {
  if (unit === 'g' || unit === 'ml') return qty + unit;
  if (unit === 'pc') return '×' + fmtFrac(qty);
  if (unit === 'cup') return fmtFrac(qty) + ' cup';
  return fmtFrac(qty) + ' ' + unit;
}
function presetComponents(p) {
  if (!Array.isArray(p._builder)) return [];
  return p._builder.map(r => ({ comp: COMP_BY_ID[r.componentId], qty: r.qty, unit: r.unit })).filter(x => x.comp);
}


// All persisted keys are namespaced so this shared build never collides with
// another Nutrition app on the same origin (e.g. GitHub Pages project sites
// all share <user>.github.io). Bump or change NS to fork storage again.
const NS = 'shared.';

const storage = {
  async get(key) {
    const k = NS + key;
    if (typeof window !== 'undefined' && window.storage && typeof window.storage.getItem === 'function') {
      try { return await window.storage.getItem(k); } catch (e) {}
    }
    try { return localStorage.getItem(k); } catch (e) { return null; }
  },
  async set(key, value) {
    const k = NS + key;
    if (typeof window !== 'undefined' && window.storage && typeof window.storage.setItem === 'function') {
      try { await window.storage.setItem(k, value); return; } catch (e) {}
    }
    try { localStorage.setItem(k, value); } catch (e) {}
  },
};

function dateKey(d = new Date()) {
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `log:${yyyy}-${mm}-${dd}`;
}

function formatToday() {
  return new Date().toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
}

function ppKc(meal) {
  return meal.kcal > 0 ? (meal.p / meal.kcal) * 100 : 0;
}

function ratioBand(ratio) {
  if (ratio == null) return 'info';
  if (ratio <= 8) return 'good';
  if (ratio <= 11) return 'warn';
  return 'bad';
}

function categoryFromPp(pp) {
  if (pp > 10) return 'anchor';
  if (pp >= 6) return 'balanced';
  return 'filler';
}

// ── Suggestions engine ──────────────────────────────────────────────
// Fit lives in the MIX, not the dish: the protein efficiency you still need
// (g/100kcal of remaining budget) maps to the dish tier that satisfies it,
// and that sets the anchor/balanced/filler ratio of what you're shown.
function mulberry32(a) {
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function seededShuffle(arr, rng) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(rng() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}
function hashStr(s) { let h = 0; for (let i = 0; i < s.length; i++) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0; return h >>> 0; }

function requiredTier(totals, targets) {
  const proteinLeft = Math.max(0, targets.protein - totals.p);
  const kcalLeft = Math.max(0, targets.caloriesTarget - totals.kcal);
  if (proteinLeft <= 0) return 'filler';        // protein done → anything goes
  if (kcalLeft <= 0) return 'anchor';           // no room, still short → pure protein
  const ratio = (proteinLeft / kcalLeft) * 100; // same boundaries as the dish tiers
  return ratio >= 10 ? 'anchor' : ratio >= 6 ? 'balanced' : 'filler';
}
const BASE_MIX = {
  anchor:   { anchor: 4, balanced: 4, filler: 2 },
  balanced: { anchor: 3, balanced: 4, filler: 3 },
  filler:   { anchor: 2, balanced: 4, filler: 4 },
};
function mixCounts(tier, count) {
  const base = BASE_MIX[tier], total = 10;
  let a = Math.round(base.anchor / total * count), b = Math.round(base.balanced / total * count), f = Math.round(base.filler / total * count);
  let drift = count - (a + b + f);
  const order = tier === 'anchor' ? ['anchor', 'balanced', 'filler'] : tier === 'filler' ? ['filler', 'balanced', 'anchor'] : ['balanced', 'anchor', 'filler'];
  const inc = { anchor: () => a++, balanced: () => b++, filler: () => f++ };
  const cur = () => ({ anchor: a, balanced: b, filler: f });
  let gi = 0;
  while (drift !== 0) { const k = order[gi % 3]; if (drift > 0) { inc[k](); drift--; } else if (cur()[k] > 0) { ({ anchor: () => a--, balanced: () => b--, filler: () => f-- })[k](); drift++; } gi++; }
  return { anchor: a, balanced: b, filler: f };
}
function presetExcluded(p, excludedSet) {
  if (!excludedSet || excludedSet.size === 0) return false;
  return Array.isArray(p._builder) && p._builder.some(r => excludedSet.has(r.componentId));
}
function drawMix(pool, tier, count, rng) {
  const want = mixCounts(tier, count);
  const buckets = { anchor: seededShuffle(pool.filter(p => p.cat === 'anchor'), rng), balanced: seededShuffle(pool.filter(p => p.cat === 'balanced'), rng), filler: seededShuffle(pool.filter(p => p.cat === 'filler'), rng) };
  const picked = [];
  const order = tier === 'anchor' ? ['anchor', 'balanced', 'filler'] : tier === 'filler' ? ['filler', 'balanced', 'anchor'] : ['balanced', 'anchor', 'filler'];
  order.forEach(k => { for (let i = 0; i < want[k] && buckets[k].length; i++) picked.push(buckets[k].shift()); });
  let guard = 0;
  while (picked.length < count && guard++ < 60) { let added = false; for (const k of order) { if (buckets[k].length) { picked.push(buckets[k].shift()); added = true; break; } } if (!added) break; }
  return seededShuffle(picked, mulberry32(Math.floor(rng() * 1e9)));
}
function drawSuggestions(presets, tier, count, seed, excludedSet, maxPerCuisine = 2) {
  const rng = mulberry32(seed);
  const pool = presets.filter(p => !presetExcluded(p, excludedSet));
  const want = mixCounts(tier, count);
  const buckets = { anchor: seededShuffle(pool.filter(p => p.cat === 'anchor'), rng), balanced: seededShuffle(pool.filter(p => p.cat === 'balanced'), rng), filler: seededShuffle(pool.filter(p => p.cat === 'filler'), rng) };
  const picked = [], cc = {};
  const order = tier === 'anchor' ? ['anchor', 'balanced', 'filler'] : tier === 'filler' ? ['filler', 'balanced', 'anchor'] : ['balanced', 'anchor', 'filler'];
  const tryTake = (k, n) => { let taken = 0; const skip = []; while (taken < n && buckets[k].length) { const c = buckets[k].shift(); if ((cc[c.cuisine] || 0) < maxPerCuisine) { picked.push(c); cc[c.cuisine] = (cc[c.cuisine] || 0) + 1; taken++; } else skip.push(c); } buckets[k] = skip.concat(buckets[k]); };
  order.forEach(k => tryTake(k, want[k]));
  let guard = 0;
  while (picked.length < count && guard++ < 80) { let added = false; for (const k of order) { if (buckets[k].length) { picked.push(buckets[k].shift()); added = true; break; } } if (!added) break; }
  return seededShuffle(picked, mulberry32(seed ^ 0x9e3779b9));
}
function drawCuisine(presets, cuisineKey, tier, count, seed, excludedSet) {
  const pool = presets.filter(p => p.cuisine === cuisineKey && !presetExcluded(p, excludedSet));
  return drawMix(pool, tier, Math.min(count, pool.length), mulberry32(seed ^ hashStr(cuisineKey)));
}

// Fraction of "active eating window" elapsed: 8am → 9pm (13h)
function dayPaceFraction(d = new Date()) {
  const start = 8;
  const end = 21;
  const hours = d.getHours() + d.getMinutes() / 60;
  if (hours < start) return 0;
  if (hours > end) return 1;
  return (hours - start) / (end - start);
}

function App() {
  const [meals, setMeals] = useState([]);
  const [savedMeals, setSavedMeals] = useState([]);
  const [activeKey, setActiveKey] = useState(dateKey());
  const [loaded, setLoaded] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [editingBuilderMeal, setEditingBuilderMeal] = useState(null); // meal being rebuilt in Builder
  const [now, setNow] = useState(new Date());
  const [sheetOpen, setSheetOpen] = useState(false);
  const [sheetTab, setSheetTab] = useState('presets');
  const [builderPrefill, setBuilderPrefill] = useState(null); // preset being adjusted before logging
  const [sheetIntent, setSheetIntent] = useState('options'); // 'options' (discover) | 'add' (search/log)
  const [excluded, setExcluded] = useState(() => new Set()); // never-recommend component ids
  const [suggestSeed, setSuggestSeed] = useState(1); // bump to re-roll suggestions
  const [recentlyAddedId, setRecentlyAddedId] = useState(null);
  const [targets, setTargets] = useState(DEFAULT_TARGETS);
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [historyOpen, setHistoryOpen] = useState(false);
  const [theme, setTheme] = useState('tidepool'); // 'tidepool' | 'harbor'

  useEffect(() => {
    let cancelled = false;
    (async () => {
      const [mealsRaw, savedRaw, targetsRaw, themeRaw, excludesRaw] = await Promise.all([
        storage.get(activeKey),
        storage.get('meals:saved'),
        storage.get('targets:v1'),
        storage.get('theme:v1'),
        storage.get('excludes:v1'),
      ]);
      if (cancelled) return;
      try { setMeals(mealsRaw ? JSON.parse(mealsRaw) || [] : []); } catch (e) { setMeals([]); }
      try { setSavedMeals(savedRaw ? JSON.parse(savedRaw) || [] : []); } catch (e) { setSavedMeals([]); }
      try { setTargets(mergeTargets(targetsRaw ? JSON.parse(targetsRaw) : null)); } catch (e) { setTargets(DEFAULT_TARGETS); }
      if (themeRaw === 'harbor' || themeRaw === 'tidepool') setTheme(themeRaw);
      try { const ex = excludesRaw ? JSON.parse(excludesRaw) : []; if (Array.isArray(ex)) setExcluded(new Set(ex)); } catch (e) {}
      setLoaded(true);
    })();
    return () => { cancelled = true; };
  }, [activeKey]);

  useEffect(() => {
    if (loaded) storage.set('targets:v1', JSON.stringify(targets));
  }, [targets, loaded]);

  // Persist never-recommend excludes.
  useEffect(() => {
    if (loaded) storage.set('excludes:v1', JSON.stringify([...excluded]));
  }, [excluded, loaded]);
  const excludeComponent = (id) => setExcluded(prev => { const n = new Set(prev); n.add(id); return n; });
  const restoreComponent = (id) => setExcluded(prev => { const n = new Set(prev); n.delete(id); return n; });

  // Apply + persist the accent theme (Tidepool / Harbor) on the root element.
  useEffect(() => {
    const root = document.documentElement;
    if (theme === 'harbor') root.setAttribute('data-theme', 'harbor');
    else root.removeAttribute('data-theme');
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute('content', theme === 'harbor' ? '#ECF0F2' : '#EAF0EF');
    if (loaded) storage.set('theme:v1', theme);
  }, [theme, loaded]);

  useEffect(() => {
    if (loaded) storage.set(activeKey, JSON.stringify(meals));
  }, [meals, activeKey, loaded]);

  useEffect(() => {
    const id = setInterval(() => {
      const n = new Date();
      setNow(n);
      const k = dateKey(n);
      if (k !== activeKey) setActiveKey(k);
    }, 60000);
    return () => clearInterval(id);
  }, [activeKey]);

  // body scroll lock when sheet is open
  useEffect(() => {
    if (sheetOpen) {
      document.body.style.overflow = 'hidden';
    } else {
      document.body.style.overflow = '';
    }
    return () => { document.body.style.overflow = ''; };
  }, [sheetOpen]);

  const totals = useMemo(() => meals.reduce((acc, m) => ({
    kcal: acc.kcal + (Number(m.kcal) || 0),
    p:    acc.p    + (Number(m.p)    || 0),
    f:    acc.f    + (Number(m.f)    || 0),
    c:    acc.c    + (Number(m.c)    || 0),
    fiber: acc.fiber + (Number(m.fiber) || 0),
  }), { kcal: 0, p: 0, f: 0, c: 0, fiber: 0 }), [meals]);

  const proteinHit = totals.p >= targets.protein;
  const kcalHit = totals.kcal >= targets.caloriesTarget;
  const proteinRemaining = Math.max(0, targets.protein - totals.p);
  const kcalRemaining = Math.max(0, targets.caloriesTarget - totals.kcal);
  const impliedRatio = (!proteinHit && kcalRemaining > 0) ? (proteinRemaining / kcalRemaining) * 100 : null;

  const addMeal = useCallback((m) => {
    const id = Date.now() + Math.random();
    setMeals(prev => [...prev, { ...m, id, addedAt: new Date().toISOString() }]);
    setRecentlyAddedId(id);
    setTimeout(() => setRecentlyAddedId(null), 800);
  }, []);

  const removeMeal = useCallback((id) => {
    setMeals(prev => prev.filter(x => x.id !== id));
  }, []);

  const updateMeal = useCallback((id, patch) => {
    setMeals(prev => prev.map(x => x.id === id ? { ...x, ...patch } : x));
    setEditingId(null);
  }, []);

  const saveForQuickAdd = useCallback((m) => {
    const entry = { id: Date.now(), name: m.name, sub: m.sub, kcal: m.kcal, p: m.p, f: m.f, c: m.c, fiber: m.fiber };
    if (m._builder) entry._builder = m._builder;
    setSavedMeals(prev => {
      if (prev.some(x => x.name === entry.name && x.kcal === entry.kcal)) return prev;
      const next = [entry, ...prev];
      storage.set('meals:saved', JSON.stringify(next));
      return next;
    });
  }, []);

  const removeSaved = useCallback((id) => {
    setSavedMeals(prev => {
      const next = prev.filter(x => x.id !== id);
      storage.set('meals:saved', JSON.stringify(next));
      return next;
    });
  }, []);

  const clearToday = useCallback(() => {
    if (!window.confirm('Clear all meals logged today? Past days are preserved.')) return;
    setMeals([]);
  }, []);

  const warnings = useMemo(() => {
    const out = [];
    const hour = now.getHours();
    const allHit = totals.p >= targets.protein
      && totals.kcal >= targets.caloriesFloor
      && totals.f >= targets.fat.min
      && totals.c >= targets.carbs.min
      && totals.fiber >= targets.fiber.min;

    if (allHit) {
      out.push({ severity: 'good', msg: <><strong>All targets hit.</strong> You nailed it today.</> });
      return out;
    }
    if (meals.length === 0) return out;

    if (totals.kcal < targets.caloriesFloor) {
      if (hour >= 21) {
        out.push({ severity: 'bad', msg: <><strong>Below {targets.caloriesFloor.toLocaleString()} kcal floor</strong> — only {Math.round(totals.kcal)} logged. Persistent undereating risks lean-mass loss. Eat now, even if not hungry.</> });
      } else if (hour >= 19) {
        out.push({ severity: 'bad', msg: <><strong>{Math.round(targets.caloriesFloor - totals.kcal)} kcal below the {targets.caloriesFloor.toLocaleString()} floor</strong> with ~{Math.max(1, 22 - hour)}h left. Stack milk + nuts + fruit immediately.</> });
      } else if (hour >= 17 && totals.kcal < targets.caloriesFloor - 300) {
        out.push({ severity: 'warn', msg: <><strong>Trending toward undershoot.</strong> {Math.round(totals.kcal)} kcal logged with {Math.max(0, 22 - hour)}h left. Plan a real dinner.</> });
      }
    }

    if (totals.kcal >= targets.caloriesFloor && totals.kcal < targets.caloriesTarget) {
      const need = targets.caloriesTarget - totals.kcal;
      out.push({ severity: 'info', msg: <><strong>{Math.round(need)} kcal to hit {targets.caloriesTarget.toLocaleString()}.</strong> {need > 500 ? 'Plan a carb/fat-forward meal: rice + legumes, beans + rice, vegetables + bread.' : 'A snack or two closes it: milk, nuts, fruit.'}</> });
    } else if (totals.kcal < targets.caloriesFloor && hour < 19) {
      const need = targets.caloriesTarget - totals.kcal;
      out.push({ severity: 'info', msg: <><strong>{Math.round(need)} kcal to hit {targets.caloriesTarget.toLocaleString()}.</strong> Eat carb/fat-forward — rice, bread, fruit, nuts.</> });
    }

    if (kcalRemaining < 500 && proteinRemaining > 25) {
      out.push({ severity: 'warn', msg: <><strong>{Math.round(proteinRemaining)}g protein needed</strong> with only {Math.round(kcalRemaining)} kcal of room. Pure-protein only: whey, chicken breast, Greek yogurt.</> });
    }

    const pctKcal = totals.kcal / targets.caloriesTarget;
    if (pctKcal >= 0.40 && pctKcal < 0.85) {
      const lagging = [];
      if (totals.f < targets.fat.min * 0.35) lagging.push({ name: 'fat', tip: 'nuts, butter, avocado' });
      if (totals.c < targets.carbs.min * 0.35) lagging.push({ name: 'carbs', tip: 'rice, bread, oats' });
      if (totals.fiber < targets.fiber.min * 0.35) lagging.push({ name: 'fiber', tip: 'beans, vegetables, oats' });
      if (lagging.length > 0) {
        const names = lagging.map(l => l.name).join(', ');
        out.push({ severity: 'info', msg: <><strong>Pace check:</strong> {names} running behind. Plan your next meal around {lagging[0].tip}.</> });
      }
    }

    if (kcalRemaining > 0 && kcalRemaining < 500) {
      if (totals.f < 50) out.push({ severity: 'warn', msg: <><strong>Fat at {Math.round(totals.f)}g</strong> — below hormonal floor. Add nuts, butter, avocado, or cooking oil.</> });
      if (totals.c < 130) out.push({ severity: 'warn', msg: <><strong>Carbs at {Math.round(totals.c)}g</strong> — add rice, bread, fruit, or potato to close the gap.</> });
      if (totals.fiber < 18) out.push({ severity: 'warn', msg: <><strong>Fiber at {Math.round(totals.fiber)}g</strong> — low fiber can slow digestion. Add beans, vegetables, fruit, or oats.</> });
    }

    return out;
  }, [totals, kcalRemaining, proteinRemaining, now, meals.length, targets]);

  // pace
  const paceFrac = dayPaceFraction(now);
  const kcalFrac = totals.kcal / targets.caloriesTarget;
  const proteinFrac = totals.p / targets.protein;
  // Use whichever is further behind to call out pace risk
  const worstFrac = Math.min(kcalFrac, proteinFrac);
  const paceDelta = worstFrac - paceFrac;
  let paceStatus = 'good', paceMsg = 'On pace';
  if (meals.length === 0) {
    paceStatus = ''; paceMsg = 'Not started';
  } else if (paceDelta < -0.20) {
    paceStatus = 'bad'; paceMsg = 'Behind pace';
  } else if (paceDelta < -0.10) {
    paceStatus = 'warn'; paceMsg = 'Slightly behind';
  } else if (paceDelta > 0.10) {
    paceStatus = 'good'; paceMsg = 'Ahead of pace';
  }

  return (
    <TargetsContext.Provider value={targets}>
    <div className="app-shell">
      <Topbar now={now} paceStatus={paceStatus} paceMsg={paceMsg} mealCount={meals.length} onClear={clearToday} onSettings={() => setSettingsOpen(true)} onHistory={() => setHistoryOpen(true)} />

      <Hero totals={totals} />

      <ImpliedRatio
        impliedRatio={impliedRatio}
        proteinHit={proteinHit}
        kcalHit={kcalHit}
        proteinRemaining={proteinRemaining}
        kcalRemaining={kcalRemaining}
        mealsLogged={meals.length}
      />

      <PaceStrip
        now={now}
        paceFrac={paceFrac}
        kcalFrac={kcalFrac}
        proteinFrac={proteinFrac}
        paceStatus={paceStatus}
        hasLogged={meals.length > 0}
      />

      <BudgetTable totals={totals} kcalRemaining={kcalRemaining} proteinRemaining={proteinRemaining} />

      <ProteinDensityChart meals={meals} />

      {warnings.length > 0 && (
        <div style={{ marginTop: 10 }}>
          {warnings.map((w, i) => (
            <div key={i} className={`nudge ${w.severity}`}>
              <div className="nudge-glyph" />
              <div className="nudge-text">{w.msg}</div>
            </div>
          ))}
        </div>
      )}

      {meals.length === 0 && <ArchitectureGuidance />}

      {meals.length > 0 && (
        <MealList
          meals={meals}
          editingId={editingId}
          onEdit={setEditingId}
          onUpdate={updateMeal}
          onRemove={removeMeal}
          onSaveQuick={saveForQuickAdd}
          onRebuild={(m) => { setEditingBuilderMeal(m); setSheetTab('build'); setSheetOpen(true); }}
          recentlyAddedId={recentlyAddedId}
        />
      )}

      {meals.length > 0 && <DaySummary totals={totals} />}

      <FabAdd
        onOptions={() => { setEditingBuilderMeal(null); setBuilderPrefill(null); setSheetTab('presets'); setSheetIntent('options'); setSheetOpen(true); }}
        onAdd={() => { setEditingBuilderMeal(null); setBuilderPrefill(null); setSheetTab('presets'); setSheetIntent('add'); setSheetOpen(true); }}
      />

      {sheetOpen && (
        <AddSheet
          onClose={() => { setSheetOpen(false); setEditingBuilderMeal(null); setBuilderPrefill(null); }}
          onAdd={(m) => {
            if (editingBuilderMeal) {
              updateMeal(editingBuilderMeal.id, m);
              setEditingBuilderMeal(null);
              setSheetOpen(false);
            } else {
              addMeal(m);
              setBuilderPrefill(null);
            }
          }}
          onAdjust={(p) => { setBuilderPrefill(p); setSheetTab('build'); }}
          onSavePreset={saveForQuickAdd}
          presets={PRESETS}
          savedMeals={savedMeals}
          onRemoveSaved={removeSaved}
          tab={sheetTab}
          setTab={setSheetTab}
          seedMeal={editingBuilderMeal || builderPrefill}
          seedKind={editingBuilderMeal ? 'edit' : (builderPrefill ? 'adjust' : null)}
          totals={totals}
          targets={targets}
          excluded={excluded}
          onExclude={excludeComponent}
          onRestore={restoreComponent}
          suggestSeed={suggestSeed}
          onRefresh={() => setSuggestSeed(s => s + 1)}
          autoSearch={sheetIntent === 'add'}
        />
      )}

      {settingsOpen && (
        <SettingsSheet
          targets={targets}
          totals={totals}
          theme={theme}
          setTheme={setTheme}
          onClose={() => setSettingsOpen(false)}
          onSave={(t) => { setTargets(t); }}
          onReset={() => { setTargets(DEFAULT_TARGETS); }}
        />
      )}
      {historyOpen && (
        <HistorySheet
          targets={targets}
          activeKey={activeKey}
          todayMeals={meals}
          onClose={() => setHistoryOpen(false)}
        />
      )}
    </div>
    </TargetsContext.Provider>
  );
}

function Topbar({ now, paceStatus, paceMsg, mealCount, onClear, onSettings, onHistory }) {
  const time = now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  return (
    <div className="topbar">
      <div className="topbar-title">
        <div className="topbar-mark" aria-hidden="true">
          <svg viewBox="0 0 14 16" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="1" width="12" height="14" rx="1.5"/><path d="M1 1v14" stroke="currentColor" strokeWidth="2"/><path d="M5 5h6M5 8h5M5 11h4" opacity="0.6"/></svg>
        </div>
        <div>
          <div className="topbar-h">Daily nutrition</div>
          <div className="topbar-date mono">{formatToday()} · {time}</div>
        </div>
      </div>
      <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
        <div className={`pace-pill ${paceStatus}`}>
          <span className="dot" /> {paceMsg}
        </div>
        {mealCount > 0 && (
          <button className="ghost-btn" onClick={onClear} title="Clear today">CLEAR</button>
        )}
        <button className="gear-btn" onClick={onHistory} title="History" aria-label="History">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/><path d="M12 7v5l3.5 2"/></svg>
        </button>
        <button className="gear-btn" onClick={onSettings} title="Edit targets" aria-label="Edit targets">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M4 5.5C4 4.67 4.67 4 5.5 4H17a3 3 0 0 1 3 3v12.2a.8.8 0 0 1-1.2.7L17 19l-2 1-2-1-2 1-2-1-2 1-1.8-1.1A.8.8 0 0 1 4 19.2V5.5z"/><path d="M8 9h8M8 12.5h8M8 16h5"/></svg>
        </button>
      </div>
    </div>
  );
}

function Hero({ totals }) {
  const targets = useContext(TargetsContext);
  const started = totals.kcal > 0 || totals.p > 0;
  const proteinPct = Math.min(100, (totals.p / targets.protein) * 100);
  const kcalPct = Math.min(100, (totals.kcal / targets.caloriesTarget) * 100);
  const proteinColor = !started ? '' : (totals.p >= targets.protein ? 'good' : (totals.p / targets.protein > 0.7 ? 'warn' : 'bad'));
  const kcalColor = !started ? '' : (totals.kcal >= targets.caloriesTarget ? 'good'
    : (totals.kcal >= targets.caloriesFloor ? 'warn' : 'bad'));
  const proteinLeft = Math.max(0, targets.protein - totals.p);
  const kcalLeft = Math.max(0, targets.caloriesTarget - totals.kcal);

  return (
    <div className="hero">
      <div className="hero-col">
        <div className="hero-label-row">
          <span className="hero-label">Protein</span>
          <span className={`hero-status ${proteinColor}`}>{!started ? `goal ${targets.protein}g` : proteinLeft === 0 ? '✓ hit' : `${Math.round(proteinLeft)}g to go`}</span>
        </div>
        <div className="hero-num mono">
          {Math.round(totals.p)}<span className="target">/{targets.protein}</span>
        </div>
        <div className="hero-rail">
          <div className={`hero-rail-fill ${proteinColor}`} style={{ width: `${proteinPct}%` }} />
        </div>
      </div>
      <div className="hero-divider" />
      <div className="hero-col">
        <div className="hero-label-row">
          <span className="hero-label">Calories</span>
          <span className={`hero-status ${kcalColor}`}>{!started ? `goal ${targets.caloriesTarget}` : kcalLeft === 0 ? '✓ hit' : `${Math.round(kcalLeft)} to go`}</span>
        </div>
        <div className="hero-num mono">
          {Math.round(totals.kcal)}<span className="target">/{targets.caloriesTarget}</span>
        </div>
        <div className="hero-rail">
          <div className={`hero-rail-fill ${kcalColor}`} style={{ width: `${kcalPct}%` }} />
        </div>
      </div>
    </div>
  );
}

function ImpliedRatio({ impliedRatio, proteinHit, kcalHit, proteinRemaining, kcalRemaining, mealsLogged }) {
  if (mealsLogged === 0) return null;
  if (proteinHit && kcalHit) return null;

  if (proteinHit) {
    return (
      <div className="ratio-strip info">
        <div className="ratio-left">
          <strong>Protein hit ✓</strong> — fill remaining <strong>{Math.round(kcalRemaining)} kcal</strong> with carb/fat-forward food.
        </div>
      </div>
    );
  }
  if (kcalHit && proteinRemaining > 0) {
    return (
      <div className="ratio-strip bad">
        <div className="ratio-left">
          Over calorie target — <strong>{Math.round(proteinRemaining)}g</strong> protein still short. Lean on whey or Greek yogurt only.
        </div>
      </div>
    );
  }
  if (impliedRatio == null) return null;
  const band = ratioBand(impliedRatio);
  const tip = band === 'good'
    ? 'Achievable with any balanced meal.'
    : band === 'warn'
    ? 'Need protein-forward picks: shake, kebab, enchiladas.'
    : 'Pure protein only: whey, chicken breast, Greek yogurt.';
  return (
    <div className={`ratio-strip ${band}`}>
      <div className="ratio-left">
        Need <strong>{Math.round(proteinRemaining)}g</strong> from <strong>{Math.round(kcalRemaining)} kcal</strong> remaining. {tip}
      </div>
      <div className={`ratio-num mono ${band}`}>
        {impliedRatio.toFixed(1)}<span className="unit">g/100kcal</span>
      </div>
    </div>
  );
}

function PaceStrip({ now, paceFrac, kcalFrac, proteinFrac, paceStatus, hasLogged }) {
  const kcalAt = Math.max(0, Math.round(kcalFrac * 100));
  const proteinAt = Math.max(0, Math.round(proteinFrac * 100));
  const started = hasLogged && paceFrac >= 0.05;

  const rowStatus = (frac) => {
    const d = frac - paceFrac;
    if (!started) return 'neutral';
    if (d < -0.20) return 'bad';
    if (d < -0.10) return 'warn';
    return 'good';
  };
  const kcalStatus = rowStatus(kcalFrac);
  const proteinStatus = rowStatus(proteinFrac);

  const worstFrac = Math.min(kcalFrac, proteinFrac);
  const delta = Math.round((worstFrac - paceFrac) * 100);
  const headlineStatus = !started ? '' : (delta < -20 ? 'bad' : delta < -10 ? 'warn' : 'good');
  const headline = !hasLogged
    ? 'Not started'
    : !started ? 'Early'
    : delta >= 0 ? `+${delta}% vs ideal`
    : `${delta}% vs ideal`;

  const timeLabel = now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }).toLowerCase();

  // Time axis: linear from 8a to 9p (13h)
  const START_H = 8, END_H = 21;
  const SPAN = END_H - START_H;
  const hoursNow = now.getHours() + now.getMinutes() / 60;
  const nowPct = Math.min(100, Math.max(0, ((hoursNow - START_H) / SPAN) * 100));
  const ticks = [
    { h: 8,  label: '8a' },
    { h: 10, label: '10a' },
    { h: 12, label: '12p' },
    { h: 14, label: '2p' },
    { h: 16, label: '4p' },
    { h: 18, label: '6p' },
    { h: 20, label: '8p' },
    { h: 21, label: '9p' },
  ];

  const kcalDelta = Math.round((kcalFrac - paceFrac) * 100);
  const proteinDelta = Math.round((proteinFrac - paceFrac) * 100);
  let foot;
  if (!hasLogged) {
    foot = <>Your eating window is <span className="num">8a–9p</span>. Log a meal and pace tracking begins.</>;
  } else if (paceFrac < 0.05) {
    foot = <>Eating window <span className="num">8a–9p</span>. Pace tracker activates after 8a.</>;
  } else if (paceFrac >= 1) {
    foot = <>Window closed at <span className="num">9p</span>.</>;
  } else if (headlineStatus === 'good') {
    foot = <>On pace at <span className="num">{timeLabel}</span>. Window closes at <span className="num">9p</span>.</>;
  } else {
    const lagging = [];
    if (kcalDelta < -10) lagging.push({ name: 'calories', d: kcalDelta });
    if (proteinDelta < -10) lagging.push({ name: 'protein', d: proteinDelta });
    if (lagging.length === 0) lagging.push({ name: 'overall', d: delta });
    foot = <><span className={`accent ${headlineStatus}`}>Lagging:</span> {lagging.map((l, i) => (
      <span key={l.name}>{i > 0 ? ', ' : ''}{l.name} <span className="num">{l.d}%</span></span>
    ))}. Window closes at <span className="num">9p</span>.</>;
  }

  return (
    <div className="pace-strip">
      <div className="pace-strip-head">
        <span className="eyebrow">Day pace</span>
        <span className={`pace-strip-delta ${headlineStatus}`}>
          <span className="num">{headline}</span>
        </span>
      </div>
      <div className="pace-rows">
        <div className="pace-row-lbl">Calories</div>
        <div className="pace-row-bar">
          <div className={`pace-row-fill actual ${kcalStatus}`} style={{ width: `${Math.min(100, kcalAt)}%` }} />
        </div>
        <div className="pace-row-val">{kcalAt}%</div>

        <div className="pace-row-lbl">Protein</div>
        <div className="pace-row-bar">
          <div className={`pace-row-fill actual ${proteinStatus}`} style={{ width: `${Math.min(100, proteinAt)}%` }} />
        </div>
        <div className="pace-row-val">{proteinAt}%</div>

        <div className="pace-row-lbl" style={{ alignSelf: 'start', paddingTop: 4 }}>Now</div>
        <div className="pace-axis-wrap">
          <div className="pace-axis-line" />
          {ticks.map(t => {
            const pct = ((t.h - START_H) / SPAN) * 100;
            return (
              <React.Fragment key={t.h}>
                <div className="pace-axis-tick" style={{ left: `${pct}%` }} />
                <div className="pace-axis-label" style={{ left: `${pct}%` }}>{t.label}</div>
              </React.Fragment>
            );
          })}
          {hoursNow >= START_H && hoursNow <= END_H && (
            <>
              <div className="pace-now-marker" style={{ left: `${nowPct}%` }} />
              <div className="pace-now-label" style={{ left: `${nowPct}%` }}>{timeLabel}</div>
            </>
          )}
        </div>
        <div />

        <div className="pace-foot">{foot}</div>
      </div>
    </div>
  );
}

  const targets = useContext(TargetsContext);

      have: Math.round(totals.f), unit: 'g',

      pct: Math.min(100, (totals.f / targets.fat.min) * 100),
      color: totals.f >= targets.fat.min ? 'good' : (kcalRemaining < 500 && totals.f < 50 ? 'bad' : 'dim'),
    },
    {
      key: 'carbs', label: 'Carbs',
      have: Math.round(totals.c), unit: 'g',
      remaining: Math.max(0, targets.carbs.min - totals.c),
      pct: Math.min(100, (totals.c / targets.carbs.min) * 100),
      color: totals.c >= targets.carbs.min ? 'good' : (kcalRemaining < 500 && totals.c < 130 ? 'bad' : 'dim'),
    },
    {
      key: 'fiber', label: 'Fiber',
      have: Math.round(totals.fiber), unit: 'g',

            </div>
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

function ProteinDensityChart({ meals }) {
  const targets = useContext(TargetsContext);
  const TARGET = (targets.protein / targets.caloriesTarget) * 100;

  const series = useMemo(() => {
    const pts = [{ x: 0, y: 0, name: '' }];
    let cumKcal = 0, cumP = 0;
    for (const m of meals) {
      cumKcal += Number(m.kcal) || 0;
      cumP += Number(m.p) || 0;
      if (cumKcal > 0) pts.push({ x: cumKcal, y: (cumP / cumKcal) * 100, name: m.name });
    }
    return pts;
  }, [meals]);

  const lastKcal = series.length ? series[series.length - 1].x : 0;
  const xMax = Math.max(targets.caloriesTarget, lastKcal);
  const observedY = series.length ? Math.max(...series.map(p => p.y)) : 0;
  const yMax = Math.max(15, Math.ceil(observedY + 2));

  const W = 360, H = 180;
  const padL = 30, padR = 14, padT = 14, padB = 26;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;
  const xScale = (x) => padL + (x / xMax) * plotW;
  const yScale = (y) => padT + (1 - y / yMax) * plotH;

  const current = series.length > 1 ? series[series.length - 1].y : null;
  const lineColor = current == null ? 'var(--info)'
    : current >= TARGET ? 'var(--good)'
    : current >= TARGET - 1 ? 'var(--warn)'
    : 'var(--bad)';

  const drawSeries = series.slice(1); // skip the (0,0) origin
  const pathD = drawSeries.length
    ? `M ${xScale(drawSeries[0].x)} ${yScale(drawSeries[0].y)} `
      + drawSeries.slice(1).map(p => `L ${xScale(p.x)} ${yScale(p.y)}`).join(' ')
    : '';

  // Filled target band: ±0.5 around target (just a hairline really)
  const bandTop = yScale(Math.min(yMax, TARGET + 0.4));
  const bandBot = yScale(Math.max(0, TARGET - 0.4));

  const yTicks = [0, 5, 10, 15];
  if (yMax > 18) yTicks.push(20);
  if (yMax > 23) yTicks.push(25);
  const xTicks = [0, Math.round(targets.caloriesTarget / 2), targets.caloriesTarget];

  return (
    <div className="card chart-card" style={{ marginTop: 10 }}>
      <div className="chart-head">
        <span className="eyebrow">Protein density trajectory</span>
        <span className="mono" style={{ fontSize: 11, color: 'var(--muted)' }}>g/100kcal · cumulative</span>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} className="chart-svg" preserveAspectRatio="none" style={{ aspectRatio: `${W}/${H}` }}>
        <defs>
          <linearGradient id="trajGrad" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stopColor={lineColor} stopOpacity="0.18" />
            <stop offset="100%" stopColor={lineColor} stopOpacity="0" />
          </linearGradient>
        </defs>

        {yTicks.filter(t => t <= yMax).map(t => (
          <line key={`g${t}`} x1={padL} y1={yScale(t)} x2={W - padR} y2={yScale(t)} stroke="var(--hairline)" strokeWidth="1" />
        ))}

        {/* target band */}
        <rect x={padL} y={bandTop} width={plotW} height={bandBot - bandTop} fill="color-mix(in oklab, var(--good) 18%, transparent)" />
        <line x1={padL} y1={yScale(TARGET)} x2={W - padR} y2={yScale(TARGET)} stroke="var(--good)" strokeWidth="1" strokeDasharray="3 3" opacity="0.85" />
        <text x={W - padR - 4} y={yScale(TARGET) - 4} fill="var(--good)" fontSize="9" textAnchor="end" fontFamily="var(--font-mono)" letterSpacing="0.04em">
          TARGET {TARGET.toFixed(1)}
        </text>

        {/* 2200 kcal vertical guide */}
        <line x1={xScale(targets.caloriesTarget)} y1={padT} x2={xScale(targets.caloriesTarget)} y2={H - padB} stroke="var(--hairline-strong)" strokeDasharray="2 3" />

        {drawSeries.length > 0 && (
          <>
            <path
              d={`${pathD} L ${xScale(drawSeries[drawSeries.length - 1].x)} ${yScale(0)} L ${xScale(drawSeries[0].x)} ${yScale(0)} Z`}
              fill="url(#trajGrad)"
            />
            <path d={pathD} stroke={lineColor} strokeWidth="1.75" fill="none" strokeLinejoin="round" strokeLinecap="round" />
          </>
        )}
        {drawSeries.map((p, i) => (
          <circle key={i} cx={xScale(p.x)} cy={yScale(p.y)} r="2.25" fill="var(--bg)" stroke={lineColor} strokeWidth="1.25" />
        ))}
        {drawSeries.length > 0 && (
          <circle
            cx={xScale(drawSeries[drawSeries.length - 1].x)}
            cy={yScale(drawSeries[drawSeries.length - 1].y)}
            r="4" fill={lineColor} stroke="var(--bg)" strokeWidth="2"
          />
        )}

        {yTicks.filter(t => t <= yMax).map(t => (
          <text key={`yl${t}`} x={padL - 6} y={yScale(t) + 3} fill="var(--muted)" fontSize="9" textAnchor="end" fontFamily="var(--font-mono)">{t}</text>
        ))}
        {xTicks.map(t => (
          <text key={`xl${t}`} x={xScale(t)} y={H - padB + 14} fill="var(--muted)" fontSize="9" textAnchor="middle" fontFamily="var(--font-mono)">
            {t === 0 ? '0' : t.toLocaleString()}
          </text>
        ))}
      </svg>

      <div className="chart-cap">
        {current == null ? (
          <>Stay above <span className="num accent good">{TARGET.toFixed(1)}</span> by end of day to land {targets.protein}g protein at {targets.caloriesTarget.toLocaleString()} kcal.</>
        ) : current >= TARGET ? (
          <>Currently <span className="num accent good">{current.toFixed(1)}</span> · <span className="num">{(current - TARGET).toFixed(1)}</span> above target. Room for fillers.</>
        ) : current >= TARGET - 1 ? (
          <>Currently <span className="num accent warn">{current.toFixed(1)}</span> · <span className="num">{(TARGET - current).toFixed(1)}</span> below target. Bias next meal toward protein.</>
        ) : (
          <>Currently <span className="num accent bad">{current.toFixed(1)}</span> · <span className="num">{(TARGET - current).toFixed(1)}</span> below target. Next meal must be a protein anchor.</>
        )}
      </div>
    </div>
  );
}

        </button>

function EditMealForm({ meal, onSave, onCancel }) {
  const [form, setForm] = useState({
    name: meal.name,
    kcal: String(meal.kcal),
    p: String(meal.p),
    f: String(meal.f),
    c: String(meal.c),
    fiber: String(meal.fiber),
  });
  const handle = (k) => (e) => setForm(p => ({ ...p, [k]: e.target.value }));
  const submit = () => {
    if (!form.name.trim()) return;
    onSave({
      name: form.name.trim(),
      kcal: parseFloat(form.kcal) || 0,
      p: parseFloat(form.p) || 0,
      f: parseFloat(form.f) || 0,
      c: parseFloat(form.c) || 0,
      fiber: parseFloat(form.fiber) || 0,
    });
  };
  return (
    <div className="custom-form">
      <input value={form.name} onChange={handle('name')} placeholder="Meal name" />
      <div className="form-grid-3">
        <div className="input-with-label"><span className="lbl">KCAL</span><input className="mono" type="number" inputMode="decimal" value={form.kcal} onChange={handle('kcal')} /></div>
        <div className="input-with-label"><span className="lbl">P</span><input className="mono" type="number" inputMode="decimal" value={form.p} onChange={handle('p')} /></div>
        <div className="input-with-label"><span className="lbl">F</span><input className="mono" type="number" inputMode="decimal" value={form.f} onChange={handle('f')} /></div>
        <div className="input-with-label"><span className="lbl">C</span><input className="mono" type="number" inputMode="decimal" value={form.c} onChange={handle('c')} /></div>
        <div className="input-with-label"><span className="lbl">FIBER</span><input className="mono" type="number" inputMode="decimal" value={form.fiber} onChange={handle('fiber')} /></div>
      </div>
      <div className="form-actions">
        <button className="btn btn-secondary" onClick={onCancel}>Cancel</button>
        <button className="btn" onClick={submit}>Save</button>
      </div>
    </div>
  );
}

function AddSheet({ onClose, onAdd, onSavePreset, presets, savedMeals, onRemoveSaved, tab, setTab, seedMeal, seedKind, onAdjust, totals, targets, excluded, onExclude, onRestore, suggestSeed, onRefresh, autoSearch }) {

  const handleAdd = (m) => {
    setPulseId(m.name);
    onAdd(m);
    setTimeout(() => setPulseId(null), 200);

  };
  const locked = !!seedKind; // editing a logged meal or adjusting a preset → force Build
  const title = seedKind === 'edit' ? 'Edit meal' : seedKind === 'adjust' ? 'Adjust before logging' : 'Add a meal';

  return (
    <>
      <div className="sheet-backdrop" onClick={onClose} />
      <div className="sheet" role="dialog" aria-modal="true">
        <div className="sheet-handle" />
        <div className="sheet-head">
          <div className="sheet-title">{title}</div>
          <div className="sheet-tabs" role="tablist">
            <button className={`sheet-tab ${tab === 'presets' ? 'active' : ''}`} onClick={() => setTab('presets')} disabled={locked}>Presets</button>
            <button className={`sheet-tab ${tab === 'build' ? 'active' : ''}`} onClick={() => setTab('build')}>Build</button>
          </div>
          <button className="icon-btn" onClick={onClose} aria-label="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>

        <div className="sheet-body">
          {tab === 'presets' && !locked ? (
            <QuickAdd
              presets={presets}
              savedMeals={savedMeals}
              onAdd={handleAdd}
              onAdjust={onAdjust}
              onRemoveSaved={onRemoveSaved}
              pulseId={pulseId}
              totals={totals}
              targets={targets}
              excluded={excluded}
              onExclude={onExclude}
              onRestore={onRestore}
              suggestSeed={suggestSeed}
              onRefresh={onRefresh}

            <BuildTab

      </div>

}

// Build tab = component picker ("From components") + totals fallback ("Just totals").

// A preset card: tap logs instantly; press-and-hold (or right-click) opens it
// pre-filled in Build to adjust sizes first. Shows its component composition.
function PresetCard({ p, onAdd, onModify, pulse }) {
  const timer = React.useRef(null);
  const fired = React.useRef(false);
  const startPt = React.useRef(null);
  const [pressing, setPressing] = useState(false);
  const comps = presetComponents(p);
  const shown = comps.slice(0, 4);
  const rest = comps.length - shown.length;

  const start = (e) => {
    fired.current = false;
    startPt.current = { x: e.clientX, y: e.clientY };
    setPressing(true);
    timer.current = setTimeout(() => { fired.current = true; setPressing(false); timer.current = null; onModify(p); }, 480);
  };
  const end = () => { setPressing(false); if (timer.current) { clearTimeout(timer.current); timer.current = null; } };
  const move = (e) => {
    if (!startPt.current || !timer.current) return;
    const dx = Math.abs(e.clientX - startPt.current.x), dy = Math.abs(e.clientY - startPt.current.y);
    if (dx > 10 || dy > 10) end();
  };
  const click = () => { if (fired.current) { fired.current = false; return; } onAdd(p); };

  return (
    <div
      className={`pcard ${pressing ? 'pressing' : ''} ${pulse ? 'pulse-good' : ''}`}
      role="button"
      tabIndex={0}
      onClick={click}
      onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onAdd(p); } }}
      onPointerDown={start}
      onPointerUp={end}
      onPointerMove={move}
      onPointerLeave={end}
      onPointerCancel={end}
      onContextMenu={(e) => { e.preventDefault(); onModify(p); }}
    >
      <button className="pcard-more" aria-label="Manage meal" onClick={(e) => { e.stopPropagation(); onModify(p); }} onPointerDown={(e) => e.stopPropagation()}>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="5" cy="12" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="19" cy="12" r="1.4"/></svg>
      </button>
      <div className="pcard-top">
        <div className="pcard-titles">
          <div className="pcard-name">{p.name}</div>
          {p.sub && <div className="pcard-sub">{p.sub}</div>}
        </div>
        <div className="pcard-macro">
          <div className="k">{p.kcal}</div>
          <div className="kc">cal</div>
          <div className="pr">{p.p}g protein</div>
        </div>
      </div>
      {shown.length > 0 && (
        <div className="pcard-chips">
          {shown.map((x, i) => (
            <span key={i} className={`pcard-chip ${i === 0 ? 'lead' : ''}`}>
              {compShort(x.comp)}<span className="q">{chipQty(x.qty, x.unit)}</span>
            </span>
          ))}
          {rest > 0 && <span className="pcard-chip more">+{rest} more</span>}
        </div>
      )}
    </div>
  );
}

function QuickAdd({ presets, savedMeals, onAdd, onAdjust, onRemoveSaved, pulseId, totals, targets, excluded, onExclude, onRestore, suggestSeed, onRefresh, autoSearch }) {
  const [openCuisine, setOpenCuisine] = useState(null);
  const [modify, setModify] = useState(null);
  const [query, setQuery] = useState('');
  const searchRef = useRef(null);
  useEffect(() => { if (autoSearch && searchRef.current) searchRef.current.focus(); }, [autoSearch]);
  const q = query.trim().toLowerCase();
  const tier = requiredTier(totals || { kcal: 0, p: 0 }, targets);

  const nonStaples = presets.filter(p => !isStaple(p));
  const staples = presets.filter(isStaple);
  const cuisineCounts = {};
  for (const p of nonStaples) cuisineCounts[p.cuisine] = (cuisineCounts[p.cuisine] || 0) + 1;
  const cuisinesWithItems = CUISINES.filter(c => (cuisineCounts[c.key] || 0) > 0);
  const excludedList = [...(excluded || [])].map(id => COMP_BY_ID[id]).filter(Boolean);
  const suggestions = useMemo(() => drawSuggestions(presets, tier, 7, suggestSeed, excluded), [presets, tier, suggestSeed, excluded]);
  const results = useMemo(() => {
    if (!q) return null;
    const terms = q.split(/\s+/);
    const scored = [];
    for (const p of presets) {
      const hay = (p.name + ' ' + (p.sub || '') + ' ' + p._builder.map(r => (COMP_BY_ID[r.componentId] ? COMP_BY_ID[r.componentId].name : '')).join(' ')).toLowerCase();
      if (!terms.every(t => hay.includes(t))) continue;
      const nm = p.name.toLowerCase();
      const rank = nm.startsWith(terms[0]) ? 0 : (nm.includes(terms[0]) ? 1 : 2);
      scored.push({ p, rank });
    }
    scored.sort((a, b) => a.rank - b.rank || a.p.name.localeCompare(b.p.name));
    return scored.map(s => s.p);
  }, [q, presets]);

  const searchBar = (
    <div className="presets-search">
      <svg className="s-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input ref={searchRef} value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Search all meals & ingredients…" />
      {query && <button className="presets-search-clear" onClick={() => setQuery('')} aria-label="Clear search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>}
    </div>
  );

  const renderCard = (p) => (
    <PresetCard key={p.name} p={p} onAdd={onAdd} onModify={setModify} pulse={pulseId === p.name} />

  const Refresh = () => (
    <button className="refresh-btn" onClick={onRefresh} aria-label="Shuffle suggestions">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
      Shuffle
    </button>
  );

  const excludedBar = excludedList.length > 0 ? (
    <div className="excluded-bar">
      <span className="excluded-lbl">Hidden</span>
      {excludedList.map(c => (
        <button key={c.id} className="excluded-chip" onClick={() => onRestore(c.id)}>
          {compShort(c)} <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      ))}
      <span className="excluded-restore">tap to restore</span>
    </div>
  ) : null;

  let bodyEl;
  if (q) {
    bodyEl = (
      <div className="sheet-section">
        <div className="sheet-section-head">
          <span className="sheet-section-title">Results</span>
          <span className="sheet-section-meta">{results.length} found</span>
        </div>
        {results.length > 0 ? (
          <div className="food-grid">{results.map(renderCard)}</div>
        ) : (
          <div className="saved-empty">No meals match “{query}”. Switch to <strong>Build</strong> to enter it from components or totals.</div>
        )}
      </div>
    );
  } else if (openCuisine) {
    const cuisine = CUISINES.find(c => c.key === openCuisine);
    const items = drawCuisine(presets, openCuisine, tier, 10, suggestSeed, excluded);
    bodyEl = (
      <div>
        <button className="cuisine-back" onClick={() => setOpenCuisine(null)}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M15 18l-6-6 6-6"/></svg>
          All cuisines
        </button>
        {excludedBar}
        <div className="sheet-section">
          <div className="sheet-section-head">
            <span className="sheet-section-title">{cuisine.label}</span>
            <Refresh />
          </div>
          <div className="food-grid">{items.map(renderCard)}</div>
        </div>
      </div>
    );
  } else {
    bodyEl = (
      <div>
        <div className="pcard-hint" style={{ margin: '2px 2px 14px' }}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 11.5V5.5a1.5 1.5 0 0 1 3 0v5"/><path d="M12 10V4.5a1.5 1.5 0 0 1 3 0V10"/><path d="M15 10V6.5a1.5 1.5 0 0 1 3 0V14a6 6 0 0 1-6 6h-1.5a5 5 0 0 1-3.7-1.6L4 15.2a1.6 1.6 0 0 1 2.3-2.2l1.7 1.5V8a1.5 1.5 0 0 1 3 0"/></svg>
          Tap to log instantly · hold a card to adjust or hide
        </div>
        {excludedBar}
        <div className="sheet-section">
          <div className="sheet-section-head">
            <span className="sheet-section-title">Saved</span>
            <span className="sheet-section-meta">long-press to remove</span>
          </div>
          {savedMeals.length === 0 ? (
            <div className="saved-empty">Star a meal in your log to save it here.</div>

            <div className="saved-row">

                <button key={m.id} className="saved-chip" onClick={() => onAdd(m)} onContextMenu={(e) => { e.preventDefault(); if (window.confirm('Remove "' + m.name + '" from saved?')) onRemoveSaved(m.id); }}>
                  {m.name} <span className="kcal mono">{Math.round(m.kcal)}</span>

            <div className="food-grid">{staples.map(renderCard)}</div>

          <div className="sheet-section">

            <span className="sheet-section-title">More by cuisine</span>
            <span className="sheet-section-meta">{nonStaples.length} meals</span>

          <div className="cuisine-grid">
