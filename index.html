              <button key={c.key} className="cuisine-folder" onClick={() => setOpenCuisine(c.key)}>
                <span className="cuisine-glyph mono">{c.glyph}</span>
                <span className="cuisine-label">{c.label}</span>
                <span className="cuisine-count mono">{cuisineCounts[c.key]}</span>
                <svg className="cuisine-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 18l6-6-6-6"/></svg>
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  return (
    <>
      {searchBar}
      {bodyEl}
      <ModifySheet preset={modify} onAdjust={onAdjust} onExclude={onExclude} onClose={() => setModify(null)} />
    </>
  );
}

// Recent components persistence (last 6 per folder).
const RECENT_KEY = 'shared.nutrition.builder.recent.v1';
const RECENT_LIMIT = 6;
function loadRecent() {
  try {
    const raw = localStorage.getItem(RECENT_KEY);
    if (!raw) return {};
    const obj = JSON.parse(raw);
    return obj && typeof obj === 'object' ? obj : {};
  } catch (e) { return {}; }
}
function saveRecent(r) {
  try { localStorage.setItem(RECENT_KEY, JSON.stringify(r)); } catch (e) {}
}

function BuilderAdd({ onSubmit, onCancel, onSavePreset, editingMeal, submitLabel }) {
  const [rows, setRows] = useState(() => {
    if (editingMeal && Array.isArray(editingMeal._builder)) {
      return editingMeal._builder.map(r => ({
        key: Date.now() + Math.random(),
        componentId: r.componentId,
        qty: r.qty,
        unit: r.unit,
      }));
    }
    return [];
  });
  const [query, setQuery] = useState('');
  const [name, setName] = useState(editingMeal ? editingMeal.name : '');
  const [activeFolder, setActiveFolder] = useState('protein');
  const [recent, setRecent] = useState(() => loadRecent());
  const [toast, setToast] = useState(null);
  const searchRef = useRef(null);
  const toastTimerRef = useRef(null);
  const longPressTimerRef = useRef(null);

  // Focus search when builder mounts.
  useEffect(() => {
    const t = setTimeout(() => { try { searchRef.current && searchRef.current.focus(); } catch(e) {} }, 50);
    return () => clearTimeout(t);
  }, []);

  // Cleanup toast timer on unmount.
  useEffect(() => () => { if (toastTimerRef.current) clearTimeout(toastTimerRef.current); }, []);

  const fireToast = (msg) => {
    setToast({ msg, id: Date.now() });
    if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
    toastTimerRef.current = setTimeout(() => setToast(null), 1400);
  };

  const pushRecent = (c) => {
    setRecent(prev => {
      const cur = prev[c.group] || [];
      const next = [c.id, ...cur.filter(id => id !== c.id)].slice(0, RECENT_LIMIT);
      const out = { ...prev, [c.group]: next };
      saveRecent(out);
      return out;
    });
  };

  // Tap a tile: bump qty on existing row by one defaultQty step, or add a new row.
  const addOrBump = (c) => {
    setRows(prev => {
      const existingIdx = prev.findIndex(r => r.componentId === c.id);
      if (existingIdx >= 0) {
        const next = [...prev];
        const cur = next[existingIdx];
        // bump in cur.unit if it matches default unit; else just bump default qty.
        const stepUnit = cur.unit === c.defaultUnit ? cur.unit : c.defaultUnit;
        const stepBy = c.defaultQty;
        const curQty = Number(cur.qty) || 0;
        next[existingIdx] = { ...cur, qty: curQty + stepBy, unit: stepUnit };
        fireToast(`+${stepBy}${stepUnit === 'pc' ? '' : stepUnit} ${c.name.toLowerCase()}`);
        return next;
      }
      const key = Date.now() + Math.random();
      fireToast(`Added ${c.name.toLowerCase()}`);
      return [...prev, { key, componentId: c.id, qty: c.defaultQty, unit: c.defaultUnit }];
    });
    pushRecent(c);
  };

  // Step qty up or down on the (single) existing row by one `step`.
  const stepQty = (c, dir) => {
    setRows(prev => {
      const idx = prev.findIndex(r => r.componentId === c.id);
      if (idx < 0) return prev;
      const next = [...prev];
      const cur = next[idx];
      const step = c.step || c.defaultQty;
      const raw = (Number(cur.qty) || 0) + dir * step;
      // Snap to step grid + round to avoid 0.30000004
      const snapped = Math.round(raw / step) * step;
      const newQty = Math.max(0, Math.round(snapped * 100) / 100);
      if (newQty === 0) {
        return prev.filter(r => r.componentId !== c.id);
      }
      next[idx] = { ...cur, qty: newQty };
      return next;
    });
  };

  // Remove ALL rows of this component (used by long-press and badge tap).
  const removeAllOf = (c) => {
    setRows(prev => prev.filter(r => r.componentId !== c.id));
    fireToast(`Removed ${c.name.toLowerCase()}`);
  };

  // Long-press handlers on tiles.
  const onTilePressStart = (c) => {
    if (longPressTimerRef.current) clearTimeout(longPressTimerRef.current);
    longPressTimerRef.current = setTimeout(() => {
      removeAllOf(c);
      longPressTimerRef.current = 'fired';
    }, 550);
  };
  const onTilePressEnd = (c, e) => {
    const fired = longPressTimerRef.current === 'fired';
    if (longPressTimerRef.current && longPressTimerRef.current !== 'fired') clearTimeout(longPressTimerRef.current);
    longPressTimerRef.current = null;
    if (fired) { e && e.preventDefault(); return false; }
    return true;
  };
  const onTileClick = (c, e) => {
    // If long-press already fired, swallow the click.
    if (longPressTimerRef.current === 'fired') {
      longPressTimerRef.current = null;
      e && e.preventDefault();
      return;
    }
    addOrBump(c);
  };

  const updateRow = (key, patch) => setRows(prev => prev.map(r => r.key === key ? { ...r, ...patch } : r));
  const removeRow = (key) => setRows(prev => prev.filter(r => r.key !== key));

  const q = query.trim().toLowerCase();

  // Per-folder filtered + sub-grouped library (with Recent prepended).
  const folderLibrary = useMemo(() => {
    const out = {};
    const byId = new Map(BUILDER_COMPONENTS.map(c => [c.id, c]));
    for (const g of BUILDER_GROUPS) {
      const inGroup = BUILDER_COMPONENTS.filter(c => c.group === g.key);
      const filtered = q ? inGroup.filter(c => c.name.toLowerCase().includes(q)) : inGroup;
      const subs = {};
      const subOrder = [];
      // Recent (only if not searching, and we actually have recent ids for this folder)
      if (!q) {
        const ids = (recent[g.key] || []).map(id => byId.get(id)).filter(Boolean);
        if (ids.length) {
          subs['Recent'] = ids;
          subOrder.push('Recent');
        }
      }
      for (const c of filtered) {
        const sub = c.sub || 'Other';
        if (!subs[sub]) { subs[sub] = []; subOrder.push(sub); }
        subs[sub].push(c);
      }
      out[g.key] = { total: inGroup.length, shown: filtered.length, subs, subOrder };
    }
    return out;
  }, [q, recent]);

  // Selection counts per component id (multiple rows of same id stack).
  const selectionCount = useMemo(() => {
    const out = {};
    for (const r of rows) out[r.componentId] = (out[r.componentId] || 0) + 1;
    return out;
  }, [rows]);

  // Folder selection counts (number of rows with that group).
  const folderSelected = useMemo(() => {
    const out = {};
    for (const r of rows) {
      const c = BUILDER_COMPONENTS.find(x => x.id === r.componentId);
      if (!c) continue;
      out[c.group] = (out[c.group] || 0) + 1;
    }
    return out;
  }, [rows]);

  const grouped = useMemo(() => {
    const out = {};
    for (const r of rows) {
      const c = BUILDER_COMPONENTS.find(x => x.id === r.componentId);
      if (!c) continue;
      out[c.group] = out[c.group] || [];
      out[c.group].push({ ...r, _comp: c });
    }
    return out;
  }, [rows]);

  // Compute macros for a row: qty in row.unit → multiply unitFactor → ratio over defaultQty.
  const macrosForRow = (r) => {
    const c = BUILDER_COMPONENTS.find(x => x.id === r.componentId);
    if (!c) return { kcal: 0, p: 0, f: 0, c: 0, fiber: 0 };
    const factor = (c.unitFactor && c.unitFactor[r.unit] != null) ? c.unitFactor[r.unit] : 1;
    const qtyInDefault = (Number(r.qty) || 0) * factor;
    const ratio = qtyInDefault / c.defaultQty;
    const m = c.macros;
    return {
      kcal: m.kcal * ratio,
      p: m.p * ratio,
      f: m.f * ratio,
      c: m.c * ratio,
      fiber: m.fiber * ratio,
    };
  };

  const totals = useMemo(() => {
    const t = { kcal: 0, p: 0, f: 0, c: 0, fiber: 0 };
    for (const r of rows) {
      const m = macrosForRow(r);
      t.kcal += m.kcal; t.p += m.p; t.f += m.f; t.c += m.c; t.fiber += m.fiber;
    }
    return t;
  }, [rows]);

  const summary = useMemo(() => {
    if (!rows.length) return '';
    return rows.map(r => {
      const c = BUILDER_COMPONENTS.find(x => x.id === r.componentId);
      if (!c) return '';
      const qty = r.qty;
      if (r.unit === 'pc') return `${qty}× ${c.name.toLowerCase()}`;
      if (r.unit === 'g' || r.unit === 'ml') return `${qty}${r.unit} ${c.name.toLowerCase()}`;
      return `${qty} ${r.unit} ${c.name.toLowerCase()}`;
    }).filter(Boolean).join(' + ');
  }, [rows]);

  const ppk = totals.kcal > 0 ? (totals.p / totals.kcal) * 100 : 0;
  const ppkTier = totals.kcal > 0 ? categoryFromPp(ppk) : '';

  const buildPayload = () => {
    const finalName = name.trim() || summary;
    return {
      name: finalName,
      kcal: Math.round(totals.kcal),
      p: Math.round(totals.p * 10) / 10,
      f: Math.round(totals.f * 10) / 10,
      c: Math.round(totals.c * 10) / 10,
      fiber: Math.round(totals.fiber * 10) / 10,
      _builder: rows.map(r => ({ componentId: r.componentId, qty: Number(r.qty) || 0, unit: r.unit })),
    };
  };

  const submit = () => {
    if (!rows.length) return;
    onSubmit(buildPayload());
    setRows([]); setName(''); setQuery('');
  };

  const savePreset = () => {
    if (!rows.length || !onSavePreset) return;
    const payload = buildPayload();
    if (!name.trim()) {
      const proposed = window.prompt('Name this preset', summary.length > 60 ? summary.slice(0, 57) + '…' : summary);
      if (!proposed || !proposed.trim()) return;
      payload.name = proposed.trim();
      setName(payload.name);
    }
    onSavePreset(payload);
    fireToast(`Saved "${payload.name}" to presets`);
  };

  return (
    <div className="builder">
      <div className="builder-search-wrap">
        <svg className="builder-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input
          ref={searchRef}
          className="builder-search"
          value={query}
          onChange={(e) => setQuery(e.target.value)}
          onKeyDown={(e) => {
            if (e.key === 'Enter' && q) {
              // If exactly one match across all folders, add it.
              const all = BUILDER_COMPONENTS.filter(c => c.name.toLowerCase().includes(q));
              if (all.length === 1) {
                addOrBump(all[0]);
                setActiveFolder(all[0].group);
                setQuery('');
              }
            } else if (e.key === 'Escape' && query) {
              setQuery('');
            }
          }}
          placeholder="Filter components…"
        />
        {query && (
          <button className="builder-search-clear" onClick={() => setQuery('')} aria-label="Clear">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        )}
      </div>

      <div className="builder-folders" role="tablist">
        {BUILDER_GROUPS.map(g => {
          const lib = folderLibrary[g.key];
          const sel = folderSelected[g.key] || 0;
          const isActive = activeFolder === g.key;
          return (
            <button
              key={g.key}
              className={`builder-folder ${isActive ? 'active' : ''}`}
              onClick={() => setActiveFolder(g.key)}
              role="tab"
              aria-selected={isActive}
            >
              <span className="builder-folder-label">{g.label}</span>
              <span className="builder-folder-meta mono">
                {q ? `${lib.shown}/${lib.total}` : lib.total}
                {sel > 0 && <> · <span className="sel">+{sel}</span></>}
              </span>
            </button>
          );
        })}
      </div>

      <div className="builder-library">
        {(() => {
          const lib = folderLibrary[activeFolder];
          if (!lib || (lib.subOrder.length === 0)) {
            return <div className="builder-empty-folder">No matches in this folder.</div>;
          }
          return lib.subOrder.map(subKey => {
            const items = lib.subs[subKey];
            const showHead = items.length > 1 || subKey === 'Recent';
            return (
              <div key={subKey} className="builder-sub">
                {showHead && (
                  <div className="builder-sub-head">
                    <span className="builder-sub-title">{subKey}</span>
                    <span className="builder-sub-count mono">{items.length}</span>
                  </div>
                )}
                <div className="builder-tiles">
                  {items.map(c => {
                    const row = rows.find(r => r.componentId === c.id);
                    const selected = !!row;
                    return (
                      <div
                        key={subKey + ':' + c.id}
                        className={`builder-tile ${selected ? 'selected' : ''}`}
                        role="button"
                        tabIndex={0}
                        onClick={(e) => onTileClick(c, e)}
                        onMouseDown={() => onTilePressStart(c)}
                        onMouseUp={(e) => onTilePressEnd(c, e)}
                        onMouseLeave={(e) => onTilePressEnd(c, e)}
                        onTouchStart={() => onTilePressStart(c)}
                        onTouchEnd={(e) => onTilePressEnd(c, e)}
                        onTouchCancel={(e) => onTilePressEnd(c, e)}
                        onContextMenu={(e) => { e.preventDefault(); removeAllOf(c); }}
                      >
                        <span className="builder-tile-name">{c.name}</span>
                        {selected ? (
                          <span className="builder-tile-stepper" onClick={(e) => e.stopPropagation()} onMouseDown={(e) => e.stopPropagation()} onTouchStart={(e) => e.stopPropagation()}>
                            <button
                              className="builder-step-btn"
                              onClick={(e) => { e.stopPropagation(); stepQty(c, -1); }}
                              aria-label="Decrease"
                            >−</button>
                            <span className="builder-step-val mono">{row.qty}{row.unit === 'pc' ? '' : ' ' + row.unit}</span>
                            <button
                              className="builder-step-btn"
                              onClick={(e) => { e.stopPropagation(); stepQty(c, +1); }}
                              aria-label="Increase"
                            >+</button>
                          </span>
                        ) : (
                          <span className="builder-tile-meta mono">{c.defaultQty} {c.defaultUnit}</span>
                        )}
                        {selected && (
                          <button
                            className="builder-tile-badge"
                            onClick={(e) => { e.stopPropagation(); removeAllOf(c); }}
                            onMouseDown={(e) => e.stopPropagation()}
                            onTouchStart={(e) => e.stopPropagation()}
                            aria-label="Remove"
                            title="Tap to remove"
                          >
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
                          </button>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          });
        })()}
      </div>

      {toast && (
        <div className="builder-toast-host" key={toast.id}>
          <div className="builder-toast">{toast.msg}</div>
        </div>
      )}

      {rows.length > 0 && (
        <>
          <div className="builder-selected-head">
            <span className="sheet-section-title">In this meal</span>
            <span className="builder-selected-meta mono">{rows.length} item{rows.length === 1 ? '' : 's'}</span>
          </div>
          <div className="builder-stack">
            {BUILDER_GROUPS.map(g => {
              const items = grouped[g.key];
              if (!items || !items.length) return null;
              return (
                <div key={g.key} className="builder-group">
                  <div className="builder-group-head">
                    <span className="sheet-section-title">{g.label}</span>
                  </div>
                  {items.map(r => (
                    <div key={r.key} className="builder-row">
                      <span className="builder-row-name">{r._comp.name}</span>
                      <input
                        className="builder-qty mono"
                        type="number"
                        inputMode="decimal"
                        value={r.qty}
                        onChange={(e) => updateRow(r.key, { qty: e.target.value })}
                      />
                      {r._comp.units.length > 1 ? (
                        <select className="builder-unit mono" value={r.unit} onChange={(e) => updateRow(r.key, { unit: e.target.value })}>
                          {r._comp.units.map(u => <option key={u} value={u}>{u}</option>)}
                        </select>
                      ) : (
                        <span className="builder-unit-static mono">{r.unit}</span>
                      )}
                      <button className="icon-btn" onClick={() => removeRow(r.key)} aria-label="Remove">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                      </button>
                    </div>
                  ))}
                </div>
              );
            })}
          </div>

          <div className="builder-summary">
            <div className="builder-summary-eyebrow">Preview</div>
            <div className="builder-summary-text">{summary}</div>
            <div className="builder-summary-macros mono">
              <span className="bsm-kcal">{Math.round(totals.kcal)} kcal</span>
              <span className="bsm-sep">·</span>
              <span>P {Math.round(totals.p * 10) / 10}</span>
              <span className="bsm-sep">·</span>
              <span>F {Math.round(totals.f * 10) / 10}</span>
              <span className="bsm-sep">·</span>
              <span>C {Math.round(totals.c * 10) / 10}</span>
              {totals.fiber > 0.05 && (
                <>
                  <span className="bsm-sep">·</span>
                  <span>Fib {Math.round(totals.fiber * 10) / 10}</span>
                </>
              )}
              {totals.kcal > 0 && (
                <>
                  <span className="bsm-sep">·</span>
                  <span className={`bsm-pp bsm-pp-${ppkTier}`}>{ppk.toFixed(1)} g/100k</span>
                </>
              )}
            </div>
          </div>

          <div className="custom-form" style={{ marginTop: 12 }}>
            <input value={name} onChange={(e) => setName(e.target.value)} placeholder="Name (optional — defaults to component list)" />
          </div>

          <div className="form-actions">
            <button className="btn btn-secondary" onClick={() => { setRows([]); setName(''); setQuery(''); }}>Clear</button>
            {onSavePreset && !editingMeal && (
              <button className="btn btn-secondary" onClick={savePreset} title="Save this combo as a reusable preset">Save preset</button>
            )}
            <button className="btn" onClick={submit}>{submitLabel || (editingMeal ? 'Save changes' : 'Add meal')}</button>
          </div>
        </>
      )}
    </div>
  );
}

function TotalsForm({ onSubmit, onCancel }) {
  const [form, setForm] = useState({ name: '', kcal: '', p: '', f: '', c: '', fiber: '' });
  const handle = (k) => (e) => setForm(p => ({ ...p, [k]: e.target.value }));
  const canLog = form.name.trim() && parseFloat(form.kcal) > 0;
  const submit = () => {
    if (!canLog) return;
    onSubmit({
      name: form.name.trim(),
      kcal: parseFloat(form.kcal) || 0,
      p: parseFloat(form.p) || 0,
      f: parseFloat(form.f) || 0,
      c: parseFloat(form.c) || 0,
      fiber: parseFloat(form.fiber) || 0,
    });
    setForm({ name: '', kcal: '', p: '', f: '', c: '', fiber: '' });
  };
  return (
    <div className="custom-form">
      <input value={form.name} onChange={handle('name')} placeholder="What was it? e.g. Mom's lasagne" />
      <div className="input-with-label"><span className="lbl">CALORIES</span><input className="mono" type="number" inputMode="decimal" value={form.kcal} onChange={handle('kcal')} placeholder="required" /></div>
      <div className="form-grid-3">
        <div className="input-with-label"><span className="lbl">PROTEIN</span><input className="mono" type="number" inputMode="decimal" value={form.p} onChange={handle('p')} placeholder="g" /></div>
        <div className="input-with-label"><span className="lbl">FAT</span><input className="mono" type="number" inputMode="decimal" value={form.f} onChange={handle('f')} placeholder="g" /></div>
        <div className="input-with-label"><span className="lbl">CARBS</span><input className="mono" type="number" inputMode="decimal" value={form.c} onChange={handle('c')} placeholder="g" /></div>
      </div>
      <div className="input-with-label"><span className="lbl">FIBER</span><input className="mono" type="number" inputMode="decimal" value={form.fiber} onChange={handle('fiber')} placeholder="g — optional" /></div>
      <div className="totals-hint">Only know the calories? <b>Leave the macros blank</b> — it logs as calories-only and your protein density just flags as unknown for that meal.</div>
      <div className="form-actions">
        <button className="btn btn-secondary" onClick={onCancel}>Cancel</button>
        <button className="btn" onClick={submit} disabled={!canLog}>Log meal</button>
      </div>
    </div>
  );
}

function NumField({ label, unit, value, onChange, error, min, step }) {
  const id = React.useId();
  return (
    <div className="field">
      <div className={`field-shell ${error ? 'error' : ''}`}>
        <label className="field-lbl" htmlFor={id}>{label}</label>
        <div className="field-row">
          <input
            id={id}
            className="field-input"
            type="number"
            inputMode="decimal"
            pattern="[0-9]*"
            value={value}
            min={min}
            step={step || '1'}
            onChange={(e) => onChange(e.target.value)}
          />
          {unit && <span className="field-unit">{unit}</span>}
        </div>
      </div>
      {error && <div className="field-error">{error}</div>}
    </div>
  );
}

function RangePair({ name, unit, minVal, maxVal, onMinChange, onMaxChange, sliderMin, sliderMax, error, context }) {
  const lo = Number.isFinite(parseFloat(minVal)) ? parseFloat(minVal) : sliderMin;
  const hi = Number.isFinite(parseFloat(maxVal)) ? parseFloat(maxVal) : sliderMax;
  const span = sliderMax - sliderMin || 1;
  const loPct = Math.max(0, Math.min(100, ((lo - sliderMin) / span) * 100));
  const hiPct = Math.max(0, Math.min(100, ((hi - sliderMin) / span) * 100));
  return (
    <div className={`range-pair ${error ? 'error' : ''}`}>
      <div className="range-pair-head">
        <span className="range-pair-name">{name}</span>
        <span className="range-pair-readout">
          {Math.round(lo)}<span className="sep">–</span>{Math.round(hi)}<span className="unit">{unit}</span>
        </span>
      </div>
      <div className="range-rail-wrap">
        <div className="range-rail" />
        <div className="range-rail-fill" style={{ left: `${loPct}%`, width: `${Math.max(0, hiPct - loPct)}%` }} />
        <input
          className="range-input"
          type="range"
          min={sliderMin}
          max={sliderMax}
          step="1"
          value={Math.min(hi, lo)}
          onChange={(e) => onMinChange(e.target.value)}
        />
        <input
          className="range-input"
          type="range"
          min={sliderMin}
          max={sliderMax}
          step="1"
          value={Math.max(lo, hi)}
          onChange={(e) => onMaxChange(e.target.value)}
        />
      </div>
      <div className="range-pair-axis">
        <span>{sliderMin}</span>
        <span>{sliderMax}{unit}</span>
      </div>
      {context && <div className="range-pair-context">{context}</div>}
      {error && <div className="field-error" style={{ marginTop: 8 }}>{error}</div>}
    </div>
  );
}

function HistorySheet({ targets, activeKey, todayMeals, onClose }) {
  const [range, setRange] = useState(7); // 7 or 30
  const [days, setDays] = useState([]);
  const [expanded, setExpanded] = useState({}); // { 'YYYY-MM-DD': true }

  // Load all days in range
  useEffect(() => {
    let cancelled = false;
    (async () => {
      const out = [];
      const today = new Date();
      for (let i = 0; i < range; i++) {
        const d = new Date(today);
        d.setDate(today.getDate() - i);
        const key = dateKey(d);
        let mealsArr = [];
        if (key === activeKey) {
          mealsArr = todayMeals;
        } else {
          try {
            const raw = await storage.get(key);
            mealsArr = raw ? JSON.parse(raw) || [] : [];
          } catch (e) { mealsArr = []; }
        }
        out.push({ key, date: d, meals: mealsArr });
      }
      if (!cancelled) setDays(out);
    })();
    return () => { cancelled = true; };
  }, [range, activeKey, todayMeals]);

  const dayTotals = (meals) => meals.reduce((acc, m) => ({
    kcal: acc.kcal + (Number(m.kcal) || 0),
    p:    acc.p    + (Number(m.p)    || 0),
    f:    acc.f    + (Number(m.f)    || 0),
    c:    acc.c    + (Number(m.c)    || 0),
    fiber: acc.fiber + (Number(m.fiber) || 0),
    count: acc.count + 1,
  }), { kcal: 0, p: 0, f: 0, c: 0, fiber: 0, count: 0 });

  // Aggregate stats over range
  const stats = useMemo(() => {
    const loggedDays = days.filter(d => d.meals.length > 0);
    if (loggedDays.length === 0) {
      return { logged: 0, total: days.length, avgKcal: 0, avgP: 0, hitDays: 0, ppKc: 0 };
    }
    let totalKcal = 0, totalP = 0, hitDays = 0;
    for (const d of loggedDays) {
      const t = dayTotals(d.meals);
      totalKcal += t.kcal;
      totalP += t.p;
      const hit = t.p >= targets.protein
        && t.kcal >= targets.caloriesFloor
        && t.kcal <= targets.caloriesTarget * 1.05
        && t.f >= targets.fat.min
        && t.c >= targets.carbs.min
        && t.fiber >= targets.fiber.min;
      if (hit) hitDays++;
    }
    return {
      logged: loggedDays.length,
      total: days.length,
      avgKcal: Math.round(totalKcal / loggedDays.length),
      avgP: Math.round(totalP / loggedDays.length),
      hitDays,
      ppKc: totalKcal > 0 ? (totalP / totalKcal) * 100 : 0,
    };
  }, [days, targets]);

  const fmtDate = (d) => {
    const today = new Date(); today.setHours(0,0,0,0);
    const dd = new Date(d); dd.setHours(0,0,0,0);
    const diff = Math.round((today - dd) / 86400000);
    const main = d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
    let rel = '';
    if (diff === 0) rel = 'Today';
    else if (diff === 1) rel = 'Yesterday';
    return { main, rel };
  };

  const exportCSV = () => {
    const rows = [['date', 'time', 'name', 'sub', 'kcal', 'protein_g', 'fat_g', 'carbs_g', 'fiber_g']];
    for (const d of [...days].reverse()) {
      for (const m of d.meals) {
        const at = m.addedAt ? new Date(m.addedAt) : null;
        const time = at ? at.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
        rows.push([
          d.key,
          time,
          (m.name || '').replace(/"/g, '""'),
          (m.sub || '').replace(/"/g, '""'),
          Math.round(Number(m.kcal) || 0),
          Math.round((Number(m.p) || 0) * 10) / 10,
          Math.round((Number(m.f) || 0) * 10) / 10,
          Math.round((Number(m.c) || 0) * 10) / 10,
          Math.round((Number(m.fiber) || 0) * 10) / 10,
        ]);
      }
    }
    const csv = rows.map(r => r.map(v => {
      const s = String(v);
      return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
    }).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const stamp = dateKey();
    a.download = `nutrition-${range}d-${stamp}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  const printSummary = () => {
    const w = window.open('', '_blank', 'width=800,height=900');
    if (!w) return;
    const rangeLabel = range === 7 ? 'Last 7 days' : 'Last 30 days';
    const start = days[days.length - 1]?.date;
    const end = days[0]?.date;
    const dateRange = start && end ? `${start.toLocaleDateString()} – ${end.toLocaleDateString()}` : '';
    const css = `
      * { box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #111; max-width: 720px; margin: 24px auto; padding: 0 24px; line-height: 1.5; }
      h1 { font-size: 22px; margin: 0 0 4px; }
      .meta { color: #666; font-size: 13px; margin-bottom: 24px; }
      .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; padding: 12px; background: #f7f7f7; border-radius: 6px; }
      .summary-cell .l { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: #666; }
      .summary-cell .v { font-size: 20px; font-weight: 600; font-feature-settings: 'tnum'; }
      .day { border-top: 1px solid #ddd; padding: 14px 0; page-break-inside: avoid; }
      .day-h { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
      .day-h .d { font-weight: 600; }
      .day-h .t { color: #666; font-size: 13px; font-feature-settings: 'tnum'; }
      .day-totals { font-size: 12px; color: #444; font-feature-settings: 'tnum'; margin-bottom: 6px; }
      .meal { font-size: 12px; padding: 2px 0 2px 12px; display: flex; justify-content: space-between; }
      .meal .n { color: #222; }
      .meal .m { color: #666; font-feature-settings: 'tnum'; }
      .empty { color: #aaa; font-style: italic; font-size: 12px; padding: 4px 0 4px 12px; }
      @media print { body { margin: 12mm; } }
    `;
    let html = `<!doctype html><html><head><meta charset="utf-8"><title>Nutrition · ${rangeLabel}</title><style>${css}</style></head><body>`;
    html += `<h1>Nutrition history</h1><div class="meta">${rangeLabel} · ${dateRange}</div>`;
    html += `<div class="summary">
      <div class="summary-cell"><div class="l">Days logged</div><div class="v">${stats.logged}/${stats.total}</div></div>
      <div class="summary-cell"><div class="l">Avg kcal</div><div class="v">${stats.avgKcal}</div></div>
      <div class="summary-cell"><div class="l">Avg protein</div><div class="v">${stats.avgP}g</div></div>
      <div class="summary-cell"><div class="l">All-targets days</div><div class="v">${stats.hitDays}</div></div>
    </div>`;
    for (const d of [...days].reverse()) {
      const t = dayTotals(d.meals);
      const f = fmtDate(d.date);
      html += `<div class="day"><div class="day-h"><span class="d">${f.main}${f.rel ? ' · ' + f.rel : ''}</span><span class="t">${t.count} meals</span></div>`;
      if (t.count === 0) {
        html += `<div class="empty">No meals logged.</div>`;
      } else {
        html += `<div class="day-totals">${Math.round(t.kcal)} kcal · P ${Math.round(t.p)} · F ${Math.round(t.f)} · C ${Math.round(t.c)} · Fiber ${Math.round(t.fiber)}</div>`;
        for (const m of d.meals) {
          html += `<div class="meal"><span class="n">${(m.name || '').replace(/[<>]/g,'')}</span><span class="m">${Math.round(Number(m.kcal) || 0)} · P ${Math.round(Number(m.p) || 0)}</span></div>`;
        }
      }
      html += `</div>`;
    }
    html += `</body></html>`;
    w.document.open();
    w.document.write(html);
    w.document.close();
    setTimeout(() => { try { w.focus(); w.print(); } catch (e) {} }, 250);
  };

  const proteinTarget = targets.protein;
  const kcalTarget = targets.caloriesTarget;
  const kcalFloor = targets.caloriesFloor;

  return (
    <>
      <div className="sheet-backdrop" onClick={onClose} />
      <div className="sheet" role="dialog" aria-modal="true">
        <div className="sheet-handle" />
        <div className="sheet-head">
          <div className="sheet-title">History</div>
          <div className="sheet-tabs" role="tablist">
            <button className={`sheet-tab ${range === 7 ? 'active' : ''}`} onClick={() => setRange(7)} role="tab">7 days</button>
            <button className={`sheet-tab ${range === 30 ? 'active' : ''}`} onClick={() => setRange(30)} role="tab">30 days</button>
          </div>
        </div>

        <div className="sheet-body" style={{ padding: 0 }}>
          <div className="history-head-row">
            <span className="history-eyebrow">Range summary</span>
            <span className="history-range">{stats.logged}/{stats.total} days logged</span>
          </div>

          <div className="history-summary">
            <div className="history-summary-cell">
              <div className="history-summary-label">Avg kcal</div>
              <div className="history-summary-value">{stats.avgKcal || '—'}</div>
              <div className="history-summary-sub">target {kcalTarget}</div>
            </div>
            <div className="history-summary-cell">
              <div className="history-summary-label">Avg protein</div>
              <div className="history-summary-value">{stats.avgP || '—'}<span style={{ fontSize: 12, color: 'var(--ink-2)' }}>g</span></div>
              <div className="history-summary-sub">target {proteinTarget}g</div>
            </div>
            <div className="history-summary-cell">
              <div className="history-summary-label">Avg ppKc</div>
              <div className="history-summary-value">{stats.ppKc ? stats.ppKc.toFixed(1) : '—'}</div>
              <div className="history-summary-sub">g per 100 kcal</div>
            </div>
            <div className="history-summary-cell">
              <div className="history-summary-label">All-target days</div>
              <div className="history-summary-value">{stats.hitDays}</div>
              <div className="history-summary-sub">of {stats.logged} logged</div>
            </div>
          </div>

          {days.length === 0 && (
            <div className="history-empty">Loading…</div>
          )}

          {days.map(d => {
            const t = dayTotals(d.meals);
            const isToday = d.key === activeKey;
            const isEmpty = t.count === 0;
            const f = fmtDate(d.date);

            // Calorie status
            let kcalStatus = 'under';
            if (t.kcal >= kcalFloor && t.kcal <= kcalTarget * 1.05) kcalStatus = 'hit';
            else if (t.kcal > kcalTarget * 1.05) kcalStatus = 'over';
            const kcalPct = Math.min(100, (t.kcal / kcalTarget) * 100);
            const floorPct = Math.min(100, (kcalFloor / kcalTarget) * 100);

            // Protein status
            const proteinStatus = t.p >= proteinTarget ? 'hit' : 'under';
            const proteinPct = Math.min(100, (t.p / proteinTarget) * 100);

            const isExp = !!expanded[d.key];

            return (
              <div key={d.key} className={`history-day ${isToday ? 'today' : ''} ${isEmpty ? 'empty' : ''}`}>
                <div className="history-day-head">
                  <div className="history-day-date">
                    {f.main}
                    {f.rel && <span className="day-rel">{f.rel}</span>}
                  </div>
                  <div className="history-day-meta mono">
                    {isEmpty ? 'No meals' : `${t.count} ${t.count === 1 ? 'meal' : 'meals'}`}
                  </div>
                </div>

                {!isEmpty && (
                  <>
                    <div className="history-day-bars">
                      <span className="label">Kcal</span>
                      <span className="track">
                        <span className={`fill ${kcalStatus}`} style={{ width: kcalPct + '%' }} />
                        <span className="floor-tick" style={{ left: floorPct + '%' }} />
                      </span>
                      <span className={`val ${kcalStatus === 'hit' ? 'hit' : kcalStatus === 'over' ? 'over' : ''}`}>
                        {Math.round(t.kcal)} / {kcalTarget}
                      </span>
                    </div>
                    <div className="history-day-bars">
                      <span className="label">Protein</span>
                      <span className="track">
                        <span className={`fill ${proteinStatus}`} style={{ width: proteinPct + '%' }} />
                      </span>
                      <span className={`val ${proteinStatus === 'hit' ? 'hit' : ''}`}>
                        {Math.round(t.p)} / {proteinTarget}g
                      </span>
                    </div>

                    <button className="history-day-toggle" onClick={() => setExpanded(p => ({ ...p, [d.key]: !p[d.key] }))}>
                      {isExp ? '▾ HIDE MEALS' : '▸ SHOW MEALS'}
                    </button>

                    {isExp && (
                      <div className="history-day-meals">
                        {d.meals.map(m => (
                          <div key={m.id} className="h-meal">
                            <span className="h-meal-name">{m.name}</span>
                            <span className="h-meal-macros">{Math.round(Number(m.kcal) || 0)} · P {Math.round(Number(m.p) || 0)}</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </>
                )}
              </div>
            );
          })}

          <div className="history-export-row">
            <button className="btn btn-secondary" onClick={exportCSV}>Export CSV</button>
            <button className="btn btn-secondary" onClick={printSummary}>Print summary</button>
          </div>
        </div>
      </div>
    </>
  );
}

function SettingsSheet({ targets, totals, theme, setTheme, onClose, onSave, onReset }) {
  const [form, setForm] = useState({
    protein: String(targets.protein),
    caloriesTarget: String(targets.caloriesTarget),
    caloriesFloor: String(targets.caloriesFloor),
    fatMin: String(targets.fat.min),
    fatMax: String(targets.fat.max),
    carbsMin: String(targets.carbs.min),
    carbsMax: String(targets.carbs.max),
    fiberMin: String(targets.fiber.min),
    fiberMax: String(targets.fiber.max),
  });
  const setField = (k) => (v) => setForm(p => ({ ...p, [k]: typeof v === 'string' ? v : String(v) }));

  const parsed = {
    protein:        parseFloat(form.protein),
    caloriesTarget: parseFloat(form.caloriesTarget),
    caloriesFloor:  parseFloat(form.caloriesFloor),
    fatMin:   parseFloat(form.fatMin),
    fatMax:   parseFloat(form.fatMax),
    carbsMin: parseFloat(form.carbsMin),
    carbsMax: parseFloat(form.carbsMax),
    fiberMin: parseFloat(form.fiberMin),
    fiberMax: parseFloat(form.fiberMax),
  };

  // Per-field errors
  const fieldErrors = {};
  const posCheck = (k, label) => {
    if (!Number.isFinite(parsed[k]) || parsed[k] <= 0) fieldErrors[k] = `${label} must be > 0`;
  };
  posCheck('protein', 'Protein');
  posCheck('caloriesTarget', 'Target');
  posCheck('caloriesFloor', 'Floor');
  posCheck('fatMin', 'Min'); posCheck('fatMax', 'Max');
  posCheck('carbsMin', 'Min'); posCheck('carbsMax', 'Max');
  posCheck('fiberMin', 'Min'); posCheck('fiberMax', 'Max');

  if (Number.isFinite(parsed.caloriesTarget) && Number.isFinite(parsed.caloriesFloor) && parsed.caloriesTarget < parsed.caloriesFloor) {
    fieldErrors.caloriesTarget = fieldErrors.caloriesTarget || 'Must be ≥ floor';
  }
  if (Number.isFinite(parsed.fatMin) && Number.isFinite(parsed.fatMax) && parsed.fatMax < parsed.fatMin) {
    fieldErrors.fatRange = 'Max must be ≥ min';
  }
  if (Number.isFinite(parsed.carbsMin) && Number.isFinite(parsed.carbsMax) && parsed.carbsMax < parsed.carbsMin) {
    fieldErrors.carbsRange = 'Max must be ≥ min';
  }
  if (Number.isFinite(parsed.fiberMin) && Number.isFinite(parsed.fiberMax) && parsed.fiberMax < parsed.fiberMin) {
    fieldErrors.fiberRange = 'Max must be ≥ min';
  }
  const hasErrors = Object.keys(fieldErrors).length > 0;

  const ratio = (Number.isFinite(parsed.protein) && Number.isFinite(parsed.caloriesTarget) && parsed.caloriesTarget > 0)
    ? (parsed.protein / parsed.caloriesTarget) * 100
    : null;
  const baseRatio = (targets.protein / targets.caloriesTarget) * 100;
  const ratioDelta = ratio != null ? ratio - baseRatio : 0;

  // Auto-save (debounced)
  const [saveState, setSaveState] = useState('idle'); // idle | saving | saved
  const saveTimer = useRef(null);
  const lastSerialized = useRef(null);

  useEffect(() => {
    if (hasErrors) return;
    const next = {
      protein:        parsed.protein,
      caloriesTarget: parsed.caloriesTarget,
      caloriesFloor:  parsed.caloriesFloor,
      fat:   { min: parsed.fatMin,   max: parsed.fatMax },
      carbs: { min: parsed.carbsMin, max: parsed.carbsMax },
      fiber: { min: parsed.fiberMin, max: parsed.fiberMax },
    };
    const ser = JSON.stringify(next);
    if (ser === JSON.stringify(targets)) return;
    if (ser === lastSerialized.current) return;
    lastSerialized.current = ser;
    setSaveState('saving');
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      onSave(next);
      setSaveState('saved');
      setTimeout(() => setSaveState((s) => s === 'saved' ? 'idle' : s), 1400);
    }, 380);
    return () => { if (saveTimer.current) clearTimeout(saveTimer.current); };
    // eslint-disable-next-line
  }, [form, hasErrors]);

  const reset = () => {
    if (!window.confirm('Reset all targets to defaults?')) return;
    onReset();
    setForm({
      protein: String(DEFAULT_TARGETS.protein),
      caloriesTarget: String(DEFAULT_TARGETS.caloriesTarget),
      caloriesFloor: String(DEFAULT_TARGETS.caloriesFloor),
      fatMin: String(DEFAULT_TARGETS.fat.min),
      fatMax: String(DEFAULT_TARGETS.fat.max),
      carbsMin: String(DEFAULT_TARGETS.carbs.min),
      carbsMax: String(DEFAULT_TARGETS.carbs.max),
      fiberMin: String(DEFAULT_TARGETS.fiber.min),
      fiberMax: String(DEFAULT_TARGETS.fiber.max),
    });
  };

  // Live preview math (uses draft parsed targets where valid, else current)
  const eff = {
    protein: Number.isFinite(parsed.protein) && parsed.protein > 0 ? parsed.protein : targets.protein,
    target:  Number.isFinite(parsed.caloriesTarget) && parsed.caloriesTarget > 0 ? parsed.caloriesTarget : targets.caloriesTarget,
    floor:   Number.isFinite(parsed.caloriesFloor) && parsed.caloriesFloor > 0 ? parsed.caloriesFloor : targets.caloriesFloor,
  };
  const proteinPct = Math.min(100, (totals.p / eff.protein) * 100);
  const proteinColor = totals.p >= eff.protein ? 'good' : (totals.p / eff.protein > 0.7 ? 'warn' : 'bad');
  const kcalPct = Math.min(100, (totals.kcal / eff.target) * 100);
  const kcalColor = totals.kcal >= eff.target ? 'good' : (totals.kcal >= eff.floor ? 'warn' : 'bad');
  const floorPct = Math.min(100, (eff.floor / eff.target) * 100);

  return (
    <>
      <div className="sheet-backdrop" onClick={onClose} />
      <div className="sheet" role="dialog" aria-modal="true">
        <div className="sheet-handle" />
        <div className="sheet-head">
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <div className="sheet-title">Edit targets</div>
            <span className={`saved-pill ${saveState !== 'idle' ? 'visible' : ''} ${saveState === 'saving' ? 'idle' : ''}`}>
              {saveState === 'saving' ? (
                <>SAVING</>
              ) : saveState === 'saved' ? (
                <><svg className="tick" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3.5"><path d="M20 6L9 17l-5-5"/></svg> SAVED</>
              ) : null}
            </span>
          </div>
          <button className="icon-btn" onClick={onClose} aria-label="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>

        <div className="settings-preview">
          <div className="settings-preview-head">
            <span className="settings-preview-eyebrow">Today against draft targets</span>
            <span className="settings-preview-meta">live</span>
          </div>
          <div className="settings-preview-rows">
            <div className="sp-row">
              <span className="sp-row-lbl">Protein</span>
              <div className="sp-row-bar">
                <div className={`sp-row-fill ${proteinColor}`} style={{ width: `${proteinPct}%` }} />
              </div>
              <span className="sp-row-val">{Math.round(totals.p)}<span className="target">/{Math.round(eff.protein)}g</span></span>
            </div>
            <div className="sp-row">
              <span className="sp-row-lbl">Calories</span>
              <div className="sp-row-bar">
                <div className={`sp-row-fill ${kcalColor}`} style={{ width: `${kcalPct}%` }} />
                {eff.floor < eff.target && <div className="sp-row-floor" style={{ left: `${floorPct}%` }} />}
              </div>
              <span className="sp-row-val">{Math.round(totals.kcal)}<span className="target">/{Math.round(eff.target)}</span></span>
            </div>
            <div className="sp-row">
              <span className="sp-row-lbl">Ratio</span>
              <div className="sp-row-bar">
                <div className="sp-row-fill" style={{ width: `${Math.min(100, (ratio || 0) * 6)}%`, background: 'var(--ink-2)' }} />
              </div>
              <span className="sp-row-val">{ratio != null ? ratio.toFixed(1) : '—'}<span className="target">g/100kcal</span></span>
            </div>
          </div>
        </div>

        <div className="sheet-body" style={{ padding: 0 }}>
          <div className="settings-section">
            <div className="settings-section-head">
              <span className="settings-section-title">Appearance</span>
              <span className="settings-section-meta">accent theme</span>
            </div>
            <div className="settings-section-help">Sets the highlight color across the app. The protein-anchor green stays a distinct signal in both.</div>
            <div className="theme-picker">
              {[
                { key: 'tidepool', name: 'Tidepool', desc: 'deep teal', bg: '#EAF0EF', accent: 'oklch(0.50 0.075 205)', good: 'oklch(0.585 0.152 142)' },
                { key: 'harbor', name: 'Harbor', desc: 'denim blue', bg: '#ECF0F2', accent: 'oklch(0.52 0.10 248)', good: 'oklch(0.575 0.152 145)' },
              ].map(opt => (
                <button
                  key={opt.key}
                  type="button"
                  className={`theme-opt ${theme === opt.key ? 'active' : ''}`}
                  onClick={() => setTheme(opt.key)}
                  aria-pressed={theme === opt.key}
                >
                  <span className="theme-swatch" style={{ background: opt.bg }}>
                    <span className="sw-accent" style={{ background: opt.accent }} />
                    <span className="sw-good" style={{ background: opt.good }} />
                  </span>
                  <span className="theme-labels">
                    <span className="theme-name">{opt.name}</span>
                    <span className="theme-desc">{opt.desc}</span>
                  </span>
                  {theme === opt.key && (
                    <svg className="theme-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
                  )}
                </button>
              ))}
            </div>
          </div>

          <div className="settings-section">
            <div className="settings-section-head">
              <span className="settings-section-title">Protein & calories</span>
              {ratio != null && (
                <span className="settings-section-meta mono">
                  <span className={`delta ${ratioDelta > 0.3 ? 'good' : ratioDelta < -0.3 ? 'bad' : ''}`} style={{ color: ratioDelta > 0.3 ? 'var(--good)' : ratioDelta < -0.3 ? 'var(--bad)' : 'var(--muted)' }}>
                    {ratio.toFixed(1)} g/100kcal
                  </span>
                </span>
              )}
            </div>
            <div className="settings-section-help">Daily protein goal, calorie target, and the floor below which the app warns about undereating.</div>
            <div className="pc-grid">
              <NumField label="Protein" unit="g" value={form.protein} onChange={setField('protein')} error={fieldErrors.protein} min="1" />
              <NumField label="Target" unit="kcal" value={form.caloriesTarget} onChange={setField('caloriesTarget')} error={fieldErrors.caloriesTarget} min="1" step="50" />
              <NumField label="Floor" unit="kcal" value={form.caloriesFloor} onChange={setField('caloriesFloor')} error={fieldErrors.caloriesFloor} min="1" step="50" />
            </div>
          </div>

          <div className="settings-section">
            <div className="settings-section-head">
              <span className="settings-section-title">Fat</span>
              <span className="settings-section-meta">macro band</span>
            </div>
            <RangePair
              name="Range"
              unit="g"
              minVal={form.fatMin}
              maxVal={form.fatMax}
              onMinChange={setField('fatMin')}
              onMaxChange={setField('fatMax')}
              sliderMin={20}
              sliderMax={150}
              error={fieldErrors.fatRange || fieldErrors.fatMin || fieldErrors.fatMax}
              context={<>Below <strong>{form.fatMin || '–'}g</strong> triggers low-fat warnings; above <strong>{form.fatMax || '–'}g</strong> counts as over.</>}
            />
          </div>

          <div className="settings-section">
            <div className="settings-section-head">
              <span className="settings-section-title">Carbs</span>
              <span className="settings-section-meta">macro band</span>
            </div>
            <RangePair
              name="Range"
              unit="g"
              minVal={form.carbsMin}
              maxVal={form.carbsMax}
              onMinChange={setField('carbsMin')}
              onMaxChange={setField('carbsMax')}
              sliderMin={50}
              sliderMax={400}
              error={fieldErrors.carbsRange || fieldErrors.carbsMin || fieldErrors.carbsMax}
              context={<>Pace nudges trigger when carbs trail this band.</>}
            />
          </div>

          <div className="settings-section">
            <div className="settings-section-head">
              <span className="settings-section-title">Fiber</span>
              <span className="settings-section-meta">macro band</span>
            </div>
            <RangePair
              name="Range"
              unit="g"
              minVal={form.fiberMin}
              maxVal={form.fiberMax}
              onMinChange={setField('fiberMin')}
              onMaxChange={setField('fiberMax')}
              sliderMin={5}
              sliderMax={60}
              error={fieldErrors.fiberRange || fieldErrors.fiberMin || fieldErrors.fiberMax}
              context={<>Daily fiber target band.</>}
            />
          </div>

          <div className="settings-foot">
            <button className="ghost-btn" onClick={reset}>Reset to defaults</button>
            <span className="settings-section-meta mono" style={{ fontSize: 10 }}>
              {hasErrors ? <span style={{ color: 'var(--bad)' }}>FIX ERRORS TO SAVE</span> : 'AUTO-SAVE ON'}
            </span>
          </div>
        </div>
      </div>
    </>
  );
}

function DaySummary({ totals }) {
  const targets = useContext(TargetsContext);
  const rows = [
    { label: 'Calories', val: `${Math.round(totals.kcal)}`, target: `≥${targets.caloriesFloor.toLocaleString()}`, pass: totals.kcal >= targets.caloriesFloor },
    { label: 'Protein',  val: `${Math.round(totals.p)}g`,    target: `≥${targets.protein}g`,                       pass: totals.p >= targets.protein },
    { label: 'Fat',      val: `${Math.round(totals.f)}g`,    target: `≥${targets.fat.min}g`,                       pass: totals.f >= targets.fat.min },
    { label: 'Carbs',    val: `${Math.round(totals.c)}g`,    target: `≥${targets.carbs.min}g`,                     pass: totals.c >= targets.carbs.min },
    { label: 'Fiber',    val: `${Math.round(totals.fiber)}g`,target: `≥${targets.fiber.min}g`,                     pass: totals.fiber >= targets.fiber.min },
  ];
  return (
    <div className="card" style={{ marginTop: 10 }}>
      <div className="card-head">
        <span className="eyebrow">Day summary</span>
      </div>
      <div className="card-divider" />
      <div className="summary-rows">
        {rows.map(r => (
          <div key={r.label} className="sum-row">
            <span className="sum-name">{r.label}</span>
            <span className="sum-val mono">{r.val}</span>
            <span className="sum-target mono">{r.target}</span>
            <span className={`sum-state ${r.pass ? 'pass' : 'fail'}`} aria-label={r.pass ? 'pass' : 'fail'}>
              {r.pass ? (
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M20 6L9 17l-5-5"/></svg>
              ) : (
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
              )}
            </span>
          </div>
        ))}
      </div>
    </div>
  );
}

function ArchitectureGuidance() {
  const targets = useContext(TargetsContext);
  const items = [
    { n: '01', label: 'Protein anchor', meta: '~550 kcal · 60g P', detail: 'shake' },
    { n: '02', label: 'Protein meal',   meta: '400–600 kcal · 40–60g P', detail: 'chicken, fish, eggs, kebabs' },
    { n: '03', label: 'Balance meal',   meta: '~400–500 kcal · 15–20g P', detail: 'rice + legumes, beans + rice, vegetables + bread' },
    { n: '04', label: 'Snacks/extras',  meta: 'fill remaining', detail: 'milk, fruit, nuts, Greek yogurt' },
  ];
  return (
    <div className="card" style={{ marginTop: 10 }}>
      <div className="empty-state">
        <h3>Day architecture</h3>
        <p>2–3 protein-dense meals do the heavy lifting. 1–2 carb/fiber/fat-forward meals fill calories to {targets.caloriesTarget.toLocaleString()} and cover floors. Build today around this shape.</p>
        <div className="arch-list">
          {items.map(it => (
            <div key={it.n} className="arch-item">
              <span className="arch-num">{it.n}</span>
              <span className="arch-text"><strong>{it.label}</strong> — {it.detail}</span>
              <span className="arch-meta">{it.meta}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
